        if (ball.vx > 0 && ball.x > ARENA.x + ARENA.w) {
          ball.line = (ball.line + 1) % PURPLE_LINES;

        if (ball.vx < 0 && ball.x < ARENA.x) {

        ctx.beginPath();
        ctx.arc(ball.x, ly, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 200, 255, 0.4)';
        ctx.beginPath();
        ctx.arc(ball.x, ly, 11, 0, Math.PI * 2);
        ctx.fill();

      ctx.restore();

  // ============================================================
  //  GREEN SOUL â locked, directional shield

  // Sequential then simultaneous cardinal shots.

    name: 'CARDINAL SHOTS',
    duration: 7.0,
    init() {
      bossAI.state.t = 0;
      bossAI.state.fireT = 0;
      bossAI.state.cycleI = 0;
      bossAI.state.phase = 'sequential';
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.2);
      s.t += dt;
      s.fireT += dt;
      if (s.phase === 'sequential') {
        const interval = (s.t < 3.5) ? 0.7 : 0.5;
        if (s.fireT >= interval) {

          _fireCardinal(s.cycleI % 4);

      } else {
        if (s.fireT >= 0.9) {
          s.fireT = 0;
          // Pairs: vertical or horizontal.
          if (s.cycleI % 2 === 0) { _fireCardinal(0); _fireCardinal(2); }
          else                    { _fireCardinal(1); _fireCardinal(3); }
          s.cycleI++;
        }
      }

  RING_OF_FIRE: {

    init() {

      bossAI.state.roundT = 999;

  // Alternating shots, accelerating, then complex pattern.
  PING_PONG: {
    name: 'PING PONG',
    duration: 7.5,
    init() {
      bossAI.state.t = 0;
      bossAI.state.fireT = 0;
      bossAI.state.idx = 0;
      bossAI.state.pattern = [2, 0, 2, 0]; // L/R simple alternation (2=L, 0=R indices)
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.2);
      s.t += dt;
      s.fireT += dt;
      // Phase 1: alternation; phase 2: complex; phase 3: rapid trio.
      let interval;
      if (s.t < 2.5)      interval = 0.55;
      else if (s.t < 5.0) interval = 0.45;
      else                interval = 0.25;
      if (s.t >= 2.5 && s.pattern.length === 4) {
        s.pattern = [2, 2, 0, 2, 0, 0, 3, 1];
      }
      if (s.fireT >= interval) {
        s.fireT = 0;
        const dirIdx = s.pattern[s.idx % s.pattern.length];
        _fireCardinal(dirIdx);
        s.idx++;
      }
    },

  // Slow big bullet feint + fast small from another direction.
  FEINT: {
    name: 'FEINT',
    duration: 7.0,
    init() {
      bossAI.state.round = -1;
      bossAI.state.roundT = 999;
      bossAI.state.fastPending = -1;     // -1 = none, otherwise direction
      bossAI.state.fastDelay = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.2);
      s.roundT += dt;
      if (s.fastPending >= 0) {
        s.fastDelay -= dt;
        if (s.fastDelay <= 0) {

          s.fastPending = -1;

      if (s.round < 2 && s.roundT >= 2.3) {
        s.round++;
        s.roundT = 0;
        const slowDir = Math.floor(Math.random() * 4);

        do { fastDir = Math.floor(Math.random() * 4); } while (fastDir === slowDir);
        _fireCardinal(slowDir, { speed: 60, r: 14, color: '#88ff88' });

  // Turret on edge, relocates; eventually two turrets.

    duration: 9.0,
    init() {

      bossAI.state.relocateT = 0;
      bossAI.state.relocations = 0;
    },

      const s = bossAI.state;
      bossSweep(dt, 0.2);
      s.relocateT += dt;
      // Add second turret after the third relocation.

        s.turrets.push({ edge: (s.turrets[0].edge + 2) % 4, fireT: 0 });

      // Relocate.
      if (s.relocateT >= 2.5) {
        s.relocateT = 0;

          do { next = Math.floor(Math.random() * 4); } while (next === t.edge);
          t.edge = next;
        }
      }
      for (const t of s.turrets) {
        t.fireT += dt;
        // Slower fire rate (was 0.20). The roulette challenge is

        if (t.fireT >= 0.32) {
          t.fireT = 0;
          _fireCardinal(t.edge, { speed: 200 });
        }
      }

    draw() {

      for (const t of s.turrets) {

        ctx.fillRect(pos.x - 6, pos.y - 6, 12, 12);
        ctx.fillStyle = '#552200';
        ctx.fillRect(pos.x - 3, pos.y - 3, 6, 6);

    },
  },

  // SIGNATURE â Toxic Fortress: 4 streams + block counter clear.
  TOXIC_FORTRESS: {
    name: 'TOXIC FORTRESS',
    duration: 11.0,
    init() {
      bossAI.state.phase = 'telegraph';
      bossAI.state.t = 0;
      bossAI.state.heavy = Math.floor(Math.random() * 4);
      bossAI.state.spawnT = 0;
      bossAI.state.blockCounter = 0;
      bossAI.state.clears = 0;
      bossAI.state.lastShieldDir = player.shieldDir;
      bossAI.state.prevPlayerHp = player.hp;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.2);
      s.t += dt;
      if (s.phase === 'telegraph') {
        if (s.t >= 1.0) { s.phase = 'active'; s.t = 0; }
        return;
      }
      // Stream from all four edges; heavy direction fires denser.
      // Was 0.10s cadence with 40% odds on light directions â that
      // produced ~24 bullets/sec across the four edges, far too
      // dense to take three clears against. 0.18s + 25% odds keeps
      // the heavy stream readable while the light ones serve as
      // pressure that the player tanks.
      s.spawnT += dt;
      if (s.spawnT >= 0.18) {
        s.spawnT = 0;
        for (let d = 0; d < 4; d++) {
          const heavy = (d === s.heavy);
          const odds = heavy ? 1.0 : 0.25;
          if (Math.random() < odds) {
            _fireCardinal(d, { speed: 180 });
          }
        }
      }
      // Detect blocked bullets via the count delta.
      // (Simpler: track bullets that are aimed at player and disappear
      // while the player's shield is correctly aligned.)
      // We approximate by counting bullets that vanished without
      // damaging the player this frame from the heavy direction.
      _toxicFortressTick(s, dt);
      if (s.clears >= 3) {
        // End early.
        bossAI.attackT = ATTACKS.TOXIC_FORTRESS.duration;
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s) return;
      if (s.phase === 'telegraph') {
        ctx.save();
        const a = 0.3 + 0.2 * Math.sin(s.t * 24);
        ctx.fillStyle = 'rgba(80, 255, 130, ' + a.toFixed(2) + ')';
        ctx.fillRect(ARENA.x, ARENA.y, ARENA.w, ARENA.h);
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.fillStyle = '#80ff90';
        ctx.textAlign = 'center';
        ctx.fillText('TOXIC FORTRESS', CANVAS_W / 2, ARENA.y - 30);
        ctx.restore();
      } else {
        // Block-counter HUD.
        ctx.save();
        const w = 180, h = 8;
        const x = (CANVAS_W - w) / 2;
        const y = ARENA.y - 22;
        ctx.fillStyle = '#003300';
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = '#80ff90';
        ctx.fillRect(x, y, w * Math.min(1, s.blockCounter / 20), h);
        ctx.strokeStyle = '#80ff90';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, w, h);
        ctx.font = '10px "Courier New", monospace';
        ctx.fillStyle = '#ccffcc';
        ctx.textAlign = 'center';
        ctx.fillText('BLOCK ' + s.blockCounter + '/20  CLEARS ' + s.clears + '/3',
                     CANVAS_W / 2, y - 2);
        ctx.restore();
      }
    },
  },
});

// ---------- Phase 2 attack helpers ----------
function _spawnBubbles() {
  bossAI.state.bubbles = [];
  for (let i = 0; i < 6; i++) {
    bossAI.state.bubbles.push({
      x: ARENA.x + 30 + Math.random() * (ARENA.w - 60),
      y: ARENA.y + 30 + Math.random() * (ARENA.h - 60),
      vx: (Math.random() - 0.5) * 50,
      vy: (Math.random() - 0.5) * 50,
      r: 22,
    });
  }
}

function _makeSnake() {
  return {
    x: ARENA.x + 20 + Math.random() * (ARENA.w - 40),
    y: ARENA.y + 20 + Math.random() * (ARENA.h - 40),
    angle: Math.random() * Math.PI * 2,
    speed: 90,
    dropT: 0,
  };
}

function _populateGrid() {
  const s = bossAI.state;
  s.gridBullets = [];
  // Wider grid spacing (was 28). With 36px step the player can
  // squeeze between bullets when the gap drifts past â they no
  // longer have to perfectly stay inside the safe pocket.
  const step = 36;
  for (let x = ARENA.x + 10; x < ARENA.x + ARENA.w; x += step) {
    for (let y = ARENA.y + 10; y < ARENA.y + ARENA.h; y += step) {
      s.gridBullets.push({ x, y });
    }
  }
}

function _staticFieldCollide(s) {
  // Static field damages player if any grid bullet (outside the gap)
  // overlaps the hitbox. Resolved here, not by enemyBullets.
  if (player.invincible || player.iframes > 0 || game.over) return;
  const half = PLAYER_HITBOX / 2;
  for (const b of s.gridBullets) {
    const dx = b.x - s.gapX, dy = b.y - s.gapY;
    if (dx * dx + dy * dy < 30 * 30) continue;
    const cx = clamp(b.x, player.x - half, player.x + half);
    const cy = clamp(b.y, player.y - half, player.y + half);
    const ex = b.x - cx, ey = b.y - cy;
    if (ex * ex + ey * ey <= ENEMY_BULLET_R * ENEMY_BULLET_R) {
      player.hp -= 1;
      player.iframes = POST_HIT_IFRAMES;
      if (player.hp <= 0) { player.hp = 0; killPlayer(); }
      return;
    }
  }
}

function _puddleDamage(puddles) {
  if (player.invincible || player.iframes > 0 || game.over) return;
  // Player feet = bottom of hitbox; puddles sit at floor.
  const feetY = player.y + PLAYER_HITBOX / 2;
  if (feetY < ARENA.y + ARENA.h - 8) return;
  for (const p of puddles) {
    if (player.x > p.x - p.w / 2 && player.x < p.x + p.w / 2) {
      player.hp -= 1;
      player.iframes = POST_HIT_IFRAMES;
      if (player.hp <= 0) { player.hp = 0; killPlayer(); }
      return;
    }
  }
}

function _makeChainBall() {
  return {
    line: 0,
    x: ARENA.x + 4,
    vx: 200 * P2_SPEED,
    dropT: 0,
  };
}

// Fire a bullet from a cardinal edge inward toward the arena center.
// dir: 0=top, 1=right, 2=bottom, 3=left
function _fireCardinal(dir, opts) {
  const o = opts || {};
  const speed = o.speed || 200;
  const cx = ARENA.x + ARENA.w / 2;
  const cy = ARENA.y + ARENA.h / 2;
  let x, y, vx, vy;
  if (dir === 0)      { x = cx; y = ARENA.y - 6;          vx = 0; vy = speed * P2_SPEED; }
  else if (dir === 1) { x = ARENA.x + ARENA.w + 6; y = cy; vx = -speed * P2_SPEED; vy = 0; }
  else if (dir === 2) { x = cx; y = ARENA.y + ARENA.h + 6; vx = 0; vy = -speed * P2_SPEED; }
  else                { x = ARENA.x - 6; y = cy;          vx = speed * P2_SPEED; vy = 0; }
  spawnBullet(x, y, vx, vy, o);
}

function _edgeAnchor(dir) {
  const cx = ARENA.x + ARENA.w / 2;
  const cy = ARENA.y + ARENA.h / 2;
  if (dir === 0) return { x: cx, y: ARENA.y - 6 };
  if (dir === 1) return { x: ARENA.x + ARENA.w + 6, y: cy };
  if (dir === 2) return { x: cx, y: ARENA.y + ARENA.h + 6 };
  return            { x: ARENA.x - 6, y: cy };
}

// Ring of fire: real cluster from one direction; rest are fakes that
// spawn briefly then fade.
function _fireRingOfFire(realDir) {
  const cx = ARENA.x + ARENA.w / 2;
  const cy = ARENA.y + ARENA.h / 2;
  const radius = Math.min(ARENA.w, ARENA.h) * 0.42;
  const N = 18;
  // Real cluster â 5 bullets spanning a 45Â° arc centered on realDir.
  const dirAngle = [3 * Math.PI / 2, 0, Math.PI / 2, Math.PI][realDir]; // top/right/bottom/left
  for (let k = 0; k < 5; k++) {
    const a = dirAngle + (k - 2) * (Math.PI / 24);
    const bx = cx + Math.cos(a) * radius;
    const by = cy + Math.sin(a) * radius;
    const sp = 200 * P2_SPEED;
    spawnBullet(bx, by, -Math.cos(a) * sp, -Math.sin(a) * sp,
                { color: '#ff6680', r: 6 });
  }
  // Fakes â visual-only, harmless.
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    // Skip angles near the real cluster.
    let near = false;
    const da = Math.atan2(Math.sin(a - dirAngle), Math.cos(a - dirAngle));
    if (Math.abs(da) < Math.PI / 5) near = true;
    if (near) continue;
    const bx = cx + Math.cos(a) * radius;
    const by = cy + Math.sin(a) * radius;
    const sp = 200 * P2_SPEED;
    spawnHarmless(bx, by, -Math.cos(a) * sp, -Math.sin(a) * sp,
                  { color: 'rgba(255, 120, 160, 0.45)', r: 5 });
  }
}

// Toxic Fortress block-counter logic. We instrument by checking
// whether bullets headed at the player matched the shield direction
// before they were consumed. We sample by counting bullets that
// crossed near the player while shield was correctly facing the
// dominant velocity component.
function _toxicFortressTick(s, dt) {
  // Walk enemy bullets â any bullet near the player whose dominant
  // approach matches shield direction, count as a block (and remove).
  const half = PLAYER_HITBOX / 2;
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    if (b.harmless) continue;
    const cx = clamp(b.x, player.x - half, player.x + half);
    const cy = clamp(b.y, player.y - half, player.y + half);
    const dx = b.x - cx, dy = b.y - cy;
    const r = (b.r || ENEMY_BULLET_R) + GREEN_SHIELD_R;
    if (dx * dx + dy * dy > r * r) continue;
    // In shield range. Find approach.
    const ax = Math.abs(b.vx || 0), ay = Math.abs(b.vy || 0);
    let approach;
    if (ax > ay) approach = (b.vx || 0) > 0 ? 'left' : 'right';
    else         approach = (b.vy || 0) >= 0 ? 'up'   : 'down';
    if (approach === player.shieldDir) {
      enemyBullets.splice(i, 1);
      s.blockCounter++;
      if (s.blockCounter >= 20) {
        s.blockCounter = 0;
        s.clears++;
        enemyBullets.length = 0;
        // Heavy stream rotates.
        let next;
        do { next = Math.floor(Math.random() * 4); } while (next === s.heavy);
        s.heavy = next;
      }
    }
  }
}

// =============================================================
//  PHASE 3 â combo attacks + 4th-wall breaks + final attack
// =============================================================
//  Phase 3 fires two attacks at once (one Phase 1, one Phase 2),
//  with the soul color forced by the combo. Game-breaking modifiers
//  (BOX_CRUSH, TEXT_BOX_ASSAULT, INVERSION, SOUL_SCRAMBLE,
//  ERROR_FLOOD) overlay between combos. At ~5% HP a 32-second
//  Final Attack runs through all four soul states. After it ends,
//  the boss stands still â the next auto-fire hit kills him.
// =============================================================

const PHASE3_COMBOS = [
  // Order matches phase3_attacks.md.
  { id: 'COMBO_1', soul: 'blue',   a1: 'ACID_RAIN',       a2: 'GRAVITY_WELL' },
  { id: 'COMBO_2', soul: 'purple', a1: 'SMOG_SPIRAL',     a2: 'TRACK_SWITCH' },
  { id: 'COMBO_3', soul: 'green',  a1: 'EXHAUST_PIPES',   a2: 'MACHINE_GUN_ROULETTE' },
  { id: 'COMBO_4', soul: 'blue',   a1: 'PIPELINE_BURST',  a2: 'RISING_SMOG' },
  { id: 'COMBO_5', soul: 'purple', a1: 'TOXIC_CLOUD',     a2: 'ALTERNATING_CURRENT' },
  { id: 'COMBO_6', soul: 'green',  a1: 'CHEMICAL_RUNOFF', a2: 'RING_OF_FIRE' },
  { id: 'COMBO_7', soul: 'purple', a1: 'SMOG_WALL',       a2: 'RAIL_SHUTDOWN' },
  { id: 'COMBO_8', soul: 'red',    a1: 'AIMED_BARRAGE',   a2: 'CONTAMINATION_ZONES' },
];

const PHASE3_MODIFIERS = ['BOX_CRUSH', 'TEXT_BOX_ASSAULT', 'INVERSION', 'ERROR_FLOOD'];
// SOUL_SCRAMBLE is held back as a one-shot ambush (handled separately).

const FINAL_ATTACK_SEQUENCE = [
  { soul: 'red',    a1: 'CONTAMINATION_ZONES', a2: 'SMOG_SPIRAL' },
  { soul: 'blue',   a1: 'ACID_RAIN',           a2: 'GEYSER' },
  { soul: 'purple', a1: 'LINE_SWEEP',          a2: 'ALTERNATING_CURRENT' },
  { soul: 'green',  a1: 'CHEMICAL_RUNOFF',     a2: 'CARDINAL_SHOTS' },
];

// Mid-combat [RED] barks, fired once each as HP crosses thresholds.
const PHASE3_BARKS = [
  { hp: 0.95, text: "YOU DON'T KNOW WHAT YOU'RE DOING" },
  { hp: 0.80, text: "THEY TOLD YOU THIS WAS A GAME" },
  { hp: 0.65, text: "IT STOPPED BEING A GAME A LONG TIME AGO" },
  { hp: 0.45, text: "YOU COULD HAVE JUST LEFT US ALONE" },
  { hp: 0.32, text: "WE WERE FINE" },
  { hp: 0.22, text: "WE WERE ALL FINE" },
  { hp: 0.10, text: "please", small: true, pause: true },
];

const ARENA_DEFAULT = { x: ARENA.x, y: ARENA.y, w: ARENA.w, h: ARENA.h };

// ---------- Phase 3 transient overlay state ----------
const phase3Bark = {
  active: false,
  text: '',
  timer: 0,
  total: 0,
  small: false,
  pauseCombat: false,
};

const errorFlood = {
  active: false,
  popups: [],
  timer: 0,
};

// ---------- Phase 3 startup ----------
// Set up Phase 2: refill the HP bar, force Red soul, clean state.
// Called from both the HP-threshold path and the death fallback so
// Phase 2 always begins with a fresh 600 HP regardless of where
// Phase 1 ended.
function startPhase2() {
  resetBossAI();
  boss.hp = boss.maxHp;
  boss.invincible = false;
  enemyBullets.length = 0;
  setState(S_RED);
  bossAI.soul = 'red';
  bossAI.soulNamedShown.red = true;
}

function startPhase3() {
  // Boss is reborn as the [RED] entity â full HP bar for the new fight.
  boss.hp = boss.maxHp;
  boss.invincible = false;
  enemyBullets.length = 0;

  // Open in COMBO 1 (Acid Rain + Gravity Well, Blue soul) per spec.
  bossAI.phase3 = {
    slot1: { attack: null, attackT: 0, state: {} },
    slot2: { attack: null, attackT: 0, state: {} },
    comboIdx: -1,                  // bumped to 0 on first start
    comboHistory: [],
    downtime: 1.2,
    pendingModifier: null,
    activeModifier: null,
    modifierT: 0,
    modifierDur: 0,
    soulScrambleUsed: false,
    errorFloodUsedOnGreen: false,
    barksFired: {},
    finalTriggered: false,
    finalStep: 0,
    finalT: 0,
    finalDone: false,
    pleasePauseT: 0,
  };
  // Force the Phase 3 opening combo's soul.
  setState(SOUL_TO_STATE[PHASE3_COMBOS[0].soul]);
  bossAI.soul = PHASE3_COMBOS[0].soul;
  bossAI.bulletSpeedMul = 1.3;     // post-Phase-1 speed bump persists
  startPhase3Combo(0);
}

function startPhase3Combo(idx) {
  const p3 = bossAI.phase3;
  const combo = PHASE3_COMBOS[idx];
  p3.comboIdx = idx;
  p3.comboHistory.push(idx);
  if (p3.comboHistory.length > 4) p3.comboHistory.shift();
  setState(SOUL_TO_STATE[combo.soul]);
  bossAI.soul = combo.soul;
  enemyBullets.length = 0;
  startSlot(p3.slot1, combo.a1);
  startSlot(p3.slot2, combo.a2);
}

function startSlot(slot, attackId) {
  slot.attack = attackId;
  slot.attackT = 0;
  slot.state = {};
  // Run the attack's init() inside its own state slot.
  withSlotContext(slot, () => {
    const def = ATTACKS[attackId];
    if (def && def.init) def.init();
  });
}

// Run a function with bossAI.{state,attack,attackT} swapped to a slot's
// context, then restore. Used for parallel attack updates.
function withSlotContext(slot, fn) {
  const sa = bossAI.state, sb = bossAI.attack, sc = bossAI.attackT;
  bossAI.state = slot.state;
  bossAI.attack = slot.attack;
  bossAI.attackT = slot.attackT;
  try {
    fn();
  } finally {
    slot.state = bossAI.state;
    slot.attack = bossAI.attack;
    slot.attackT = bossAI.attackT;
    bossAI.state = sa; bossAI.attack = sb; bossAI.attackT = sc;
  }
}

function runSlot(slot, dt) {
  if (!slot.attack) return false;
  const def = ATTACKS[slot.attack];
  if (!def) return false;
  // Increment slot timer up front to mimic updateBossAI's cadence.
  slot.attackT += dt;
  withSlotContext(slot, () => {
    if (def.update) def.update(dt);
  });
  // Slots run forever in Phase 3 â we restart attacks as their
  // duration loops, so we report "still active" always.
  return true;
}

function tickSlot(slot, dt) {
  if (!slot.attack) return;
  const def = ATTACKS[slot.attack];
  if (!def) return;
  // If a slot's attack finished, restart it (combos run for the
  // combo duration, not the individual attack durations).
  if (slot.attackT >= def.duration) {
    startSlot(slot, slot.attack);
  }
  runSlot(slot, dt);
}

// ---------- Phase 3 main update ----------
function updatePhase3AI(dt) {
  const p3 = bossAI.phase3;
  if (!p3) return;

  // Bark trigger (HP-threshold).
  _phase3CheckBarks();
  // Drain "please" pause if active â nothing else runs.
  if (p3.pleasePauseT > 0) {
    p3.pleasePauseT -= dt;
    return;
  }

  // Final Attack at ~5% HP.
  if (!p3.finalTriggered && boss.hp / boss.maxHp <= 0.05) {
    _startFinalAttack();
    return;
  }
  if (p3.finalTriggered) {
    _updateFinalAttack(dt);
    return;
  }

  // Modifier overlay (runs concurrent with combo).
  _updateModifier(dt);

  const hpFrac = boss.hp / boss.maxHp;

  // SOUL_SCRAMBLE â one-shot ambush, scheduled once past 55% HP and
  // fired mid-combo (so the new soul actually persists; combo-end
  // would re-setState to the next combo's soul).
  if (!p3.soulScrambleUsed) {
    if (p3.scrambleDelay == null && hpFrac < 0.55) {
      p3.scrambleDelay = 8 + Math.random() * 8; // 8â16s from now
    }
    if (p3.scrambleDelay != null) {
      p3.scrambleDelay -= dt;
      if (p3.scrambleDelay <= 0) {
        p3.soulScrambleUsed = true;
        _doSoulScramble();
      }
    }
  }

  // Run both combo slots in parallel.
  tickSlot(p3.slot1, dt);
  tickSlot(p3.slot2, dt);

  // Combo cycle â each combo runs ~10 seconds, then we either insert
  // a modifier or queue the next combo.
  if (!p3._comboT) p3._comboT = 0;
  p3._comboT += dt;
  const COMBO_DUR = 10;
  if (p3._comboT >= COMBO_DUR) {
    p3._comboT = 0;
    enemyBullets.length = 0;
    p3.slot1.attack = null;
    p3.slot2.attack = null;
    // Decide whether to drop a modifier: every 2â3 combos.
    p3.combosSinceMod = (p3.combosSinceMod || 0) + 1;
    if (!p3.activeModifier && p3.combosSinceMod >= 2 && Math.random() < 0.6) {
      _startModifier();
      p3.combosSinceMod = 0;
    }
    // Pick next combo. Below 15% HP zero downtime.
    p3.downtime = (hpFrac < 0.15) ? 0.0 : 0.6;
    p3._pendingNext = _pickNextCombo();
    p3._pendingDelay = p3.downtime;
  }
  if (p3._pendingNext != null) {
    p3._pendingDelay -= dt;
    if (p3._pendingDelay <= 0) {
      startPhase3Combo(p3._pendingNext);
      p3._pendingNext = null;
    }
  }
}

function _pickNextCombo() {
  const p3 = bossAI.phase3;
  const last = p3.comboHistory[p3.comboHistory.length - 1];
  let idx;
  do {
    idx = Math.floor(Math.random() * PHASE3_COMBOS.length);
  } while (idx === last);
  return idx;
}

// ---------- Mid-combat barks ----------
function _phase3CheckBarks() {
  const p3 = bossAI.phase3;
  const hpFrac = boss.hp / boss.maxHp;
  for (let i = 0; i < PHASE3_BARKS.length; i++) {
    const b = PHASE3_BARKS[i];
    if (p3.barksFired[i]) continue;
    if (hpFrac <= b.hp) {
      p3.barksFired[i] = true;
      _showBark(b);
      break; // one bark at a time
    }
  }
}

function _showBark(bark) {
  phase3Bark.active = true;
  phase3Bark.text = bark.text;
  phase3Bark.small = !!bark.small;
  phase3Bark.pauseCombat = !!bark.pause;
  phase3Bark.total = bark.pause ? 3.0 : 2.5;
  phase3Bark.timer = phase3Bark.total;
  if (bark.pause) {
    bossAI.phase3.pleasePauseT = 3.0;
    enemyBullets.length = 0;
  }
}

function updatePhase3Bark(dt) {
  if (!phase3Bark.active) return;
  phase3Bark.timer -= dt;
  if (phase3Bark.timer <= 0) {
    phase3Bark.active = false;
    phase3Bark.pauseCombat = false;
  }
}

// ---------- Game-breaking modifiers ----------
function _startModifier() {
  const p3 = bossAI.phase3;
  // ERROR_FLOOD should overlay a green soul combo at least once.
  let pool = PHASE3_MODIFIERS.slice();
  if (!p3.errorFloodUsedOnGreen && bossAI.soul === 'green') {
    p3.activeModifier = 'ERROR_FLOOD';
    p3.errorFloodUsedOnGreen = true;
  } else {
    p3.activeModifier = pool[Math.floor(Math.random() * pool.length)];
  }
  p3.modifierT = 0;
  if (p3.activeModifier === 'BOX_CRUSH')        p3.modifierDur = 5.0;
  else if (p3.activeModifier === 'TEXT_BOX_ASSAULT') p3.modifierDur = 6.0;
  else if (p3.activeModifier === 'INVERSION')   p3.modifierDur = 6.0;
  else if (p3.activeModifier === 'ERROR_FLOOD') {
    p3.modifierDur = 5.0;
    _spawnErrorPopups();
  }
}

function _updateModifier(dt) {
  const p3 = bossAI.phase3;
  if (!p3.activeModifier) return;
  p3.modifierT += dt;
  if (p3.activeModifier === 'BOX_CRUSH') {
    // Crush in over 1.5s, hold, expand back over 1.5s.
    const t = p3.modifierT;
    let f;                                  // 0 = full size, 1 = crushed
    if (t < 1.5)      f = t / 1.5;
    else if (t < 3.5) f = 1;
    else              f = Math.max(0, 1 - (t - 3.5) / 1.5);
    const wShrink = ARENA_DEFAULT.w * 0.45 * f;
    ARENA.x = ARENA_DEFAULT.x + wShrink / 2;
    ARENA.w = ARENA_DEFAULT.w - wShrink;
  } else if (p3.activeModifier === 'TEXT_BOX_ASSAULT') {
    // Stream of bullets rising from below the arena, removing the
    // bottom third. Spawn at the bottom edge moving up.
    if (Math.random() < 0.65) {
      const bx = ARENA.x + Math.random() * ARENA.w;
      spawnBullet(bx, ARENA.y + ARENA.h + 6, 0, -110 * P2_SPEED,
                  { color: '#ffaa00' });
    }
  } else if (p3.activeModifier === 'ERROR_FLOOD') {
    // Popups handled at render time; no per-tick spawning.
  }
  // INVERSION is purely visual â applied at render.

  if (p3.modifierT >= p3.modifierDur) {
    _endModifier();
  }
}

function _endModifier() {
  const p3 = bossAI.phase3;
  if (p3.activeModifier === 'BOX_CRUSH') {
    ARENA.x = ARENA_DEFAULT.x;
    ARENA.w = ARENA_DEFAULT.w;
  } else if (p3.activeModifier === 'ERROR_FLOOD') {
    errorFlood.active = false;
    errorFlood.popups = [];
  }
  p3.activeModifier = null;
  p3.modifierT = 0;
}

function _spawnErrorPopups() {
  errorFlood.active = true;
  errorFlood.popups = [];
  const N = 5;
  const titles = [
    'ERROR', 'WARNING', 'SYSTEM', 'NULL POINTER', 'STACK OVERFLOW',
  ];
  const bodies = [
    'A program has performed an illegal operation.',
    'POLLUTION_MAN.EXE has stopped responding.',
    'Cannot find file: PROMISE.DLL',
    'Insufficient memory to continue execution.',
    'The process cannot access the file because it is being used by another process.',
  ];
  for (let i = 0; i < N; i++) {
    errorFlood.popups.push({
      x: 60 + Math.random() * (CANVAS_W - 240),
      y: 120 + Math.random() * (CANVAS_H - 280),
      w: 180,
      h: 90,
      title: titles[i % titles.length],
      body: bodies[i % bodies.length],
    });
  }
}

function _doSoulScramble() {
  // Pick the worst possible transition. Heuristic: any color that
  // isn't the current one.
  const others = SOUL_ORDER.filter(s => s !== bossAI.soul);
  const next = others[Math.floor(Math.random() * others.length)];
  bossAI.soul = next;
  setState(SOUL_TO_STATE[next]);
  // No telegraph by design â that's the ambush.
}

// ---------- Final Attack ----------
function _startFinalAttack() {
  const p3 = bossAI.phase3;
  p3.finalTriggered = true;
  p3.finalStep = 0;
  p3.finalT = 0;
  // Clear modifiers and combos.
  if (p3.activeModifier) _endModifier();
  enemyBullets.length = 0;
  p3.slot1.attack = null;
  p3.slot2.attack = null;
  boss.invincible = true; // boss locked through the final attack
  _enterFinalStep(0);
}

function _enterFinalStep(idx) {
  const p3 = bossAI.phase3;
  const step = FINAL_ATTACK_SEQUENCE[idx];
  setState(SOUL_TO_STATE[step.soul]);
  bossAI.soul = step.soul;
  enemyBullets.length = 0;
  startSlot(p3.slot1, step.a1);
  startSlot(p3.slot2, step.a2);
  p3.finalT = 0;
}

function _updateFinalAttack(dt) {
  const p3 = bossAI.phase3;
  if (p3.finalDone) {
    // Boss stands still, vulnerable. Player auto-fire kills him.
    boss.invincible = false;
    return;
  }
  p3.finalT += dt;
  tickSlot(p3.slot1, dt);
  tickSlot(p3.slot2, dt);
  if (p3.finalT >= 8.0) {
    p3.finalStep++;
    if (p3.finalStep >= FINAL_ATTACK_SEQUENCE.length) {
      // Done â silence beat, then expose.
      p3.finalDone = true;
      p3.slot1.attack = null;
      p3.slot2.attack = null;
      enemyBullets.length = 0;
      boss.invincible = false;
    } else {
      _enterFinalStep(p3.finalStep);
    }
  }
}

// ---------- Phase 3 rendering ----------
function drawPhase3Attacks() {
  const p3 = bossAI.phase3;
  if (!p3) return;
  for (const slot of [p3.slot1, p3.slot2]) {
    if (!slot.attack) continue;
    const def = ATTACKS[slot.attack];
    if (!def || !def.draw) continue;
    withSlotContext(slot, () => def.draw());
  }
}

function drawPhase3Bark() {

}

function drawPhase3Modifier() {

function _wrapInBox(text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (let i = 0; i < words.length; i++) {
    const test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      line = words[i];
      cy += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, cy);
}

// True while the canvas should render upside-down for INVERSION.
function isInverted() {
  return bossAI.phase3 && bossAI.phase3.activeModifier === 'INVERSION';
}

// =============================================================
//  DEFEAT (theatrical) â replaces the standard "VICTORY!" overlay
//  for Phase 3 boss kills. Spec: white "you promised me" on red,
//  hold 5s, fade to black for 3s, redirect to kids zone.
// =============================================================

const defeatSeq = {
  active: false,
  t: 0,
  redirected: false,
};

function startDefeatSequence() {
  defeatSeq.active = true;
  defeatSeq.t = 0;
  defeatSeq.redirected = false;
  stopAllMusic();
  enemyBullets.length = 0;
  playerBullets.length = 0;
  cutscene.active = false;
  game.victory = true; // engine flag â keeps the game halted
  // Suppress the normal VICTORY overlay while defeatSeq is active.
}

function updateDefeatSequence(dt) {
  if (!defeatSeq.active) return;
  defeatSeq.t += dt;
  if (defeatSeq.t >= 8.0 && !defeatSeq.redirected) {
    defeatSeq.redirected = true;
    try { window.location.href = '../kids-zone.html'; } catch (e) {}
  }
}

function drawDefeatSequence() {
  if (!defeatSeq.active) return;
  const t = defeatSeq.t;
  ctx.save();
  if (t < 5.0) {
    // Red wash + white "you promised me".
    const a = t < 0.5 ? t / 0.5 : 1.0;
    ctx.fillStyle = 'rgba(60, 0, 0, ' + (a * 0.9).toFixed(2) + ')';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = 'rgba(140, 0, 0, ' + a.toFixed(2) + ')';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.font = 'bold 32px "Courier New", monospace';
    ctx.fillStyle = 'rgba(255, 255, 255, ' + a.toFixed(2) + ')';
    ctx.textAlign = 'center';
    ctx.fillText('you promised me', CANVAS_W / 2, CANVAS_H / 2);
  } else if (t < 5.6) {
    // Text fades.
    const f = 1 - (t - 5.0) / 0.6;
    ctx.fillStyle = 'rgba(140, 0, 0, ' + Math.max(f, 0).toFixed(2) + ')';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = 'rgba(255, 255, 255, ' + Math.max(f, 0).toFixed(2) + ')';
    ctx.font = 'bold 32px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('you promised me', CANVAS_W / 2, CANVAS_H / 2);
    ctx.fillStyle = 'rgba(0, 0, 0, ' + (1 - f).toFixed(2) + ')';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  } else {
    // Black screen, 3s of silence.
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
  ctx.restore();
}

// ---------- Replaces the old sweep-only updateBoss ----------
function updateBoss(dt) {
  if (boss.flashTimer > 0) boss.flashTimer -= dt;
  if (!isPlayingActive()) return;

  const hpFrac = boss.hp / boss.maxHp;

  // Phase 1 dialogue handshake around Acid Rain. Three steps:
  //   (a) Pre-Acid-Rain barks fire when boss reaches 30% HP, then
  //       the Acid Rain attack begins as soon as the cutscene ends.
  //   (b) Post-Acid-Rain barks fire as soon as the Acid Rain attack
  //       has resolved (queued via bossAI.postAcidRainPending).
  //   (c) Phase 1 â 2 transition fires once the post barks have
  //       played AND the boss is at low HP (or the death fallback
  //       in checkCollisions kicks in).
  if (game.phase === 1) {
    if (!bossAI.preAcidRainPlayed
        && bossAI.attack !== 'ACID_RAIN'
        && hpFrac <= 0.30) {
      bossAI.preAcidRainPlayed = true;
      enemyBullets.length = 0;
      bossAI.attack = null;
      bossAI.downtime = 0;
      playCutscene(getPreAcidRain(), () => {
        bossAI.acidRainFired = true;
        startAttack('ACID_RAIN');
      });
      return;
    }
    if (bossAI.postAcidRainPending && bossAI.attack !== 'ACID_RAIN') {
      bossAI.postAcidRainPending = false;
      enemyBullets.length = 0;
      playCutscene(getPostAcidRain(), () => {
        bossAI.postAcidRainPlayed = true;
      });
      return;
    }
    if (bossAI.postAcidRainPlayed
        && bossAI.attack !== 'ACID_RAIN'
        && hpFrac <= 0.22) {
      game.phase = 1.5;
      enemyBullets.length = 0;
      playCutscene(getPhase1To2(), () => {
        startPhase(2);
        startPhase2();
      });
      return;
    }
  }

  if (game.phase === 1) {
    // Full Phase 1 attack rotation.
    updateBossAI(dt);
  } else if (game.phase === 2) {
    // Phase 2 â soul rotation + signature gauntlet at 1 HP.
    if (bossAI.gauntletDone) {
      // Last hit lands and the bar empties â Phase 2 â 3 cutscene
      // fires straight from gauntlet, regardless of exact HP.
      game.phase = 2.5;
      enemyBullets.length = 0;
      boss.hp = 1; // visual: bar shows 1 pixel right before cutscene
      playCutscene(getPhase2To3(), () => {
        startPhase(3);
        resetBossAI();
        startPhase3();
      });
      return;
    }
    updatePhase2AI(dt);
    // Keep purple wave timer ticking in render even outside attacks.
    if (bossAI.purpleWave) bossAI.purpleWave.t += dt;
  } else if (game.phase === 3) {
    updatePhase3AI(dt);
    if (bossAI.purpleWave) bossAI.purpleWave.t += dt;
  } else {
    bossSweep(dt);
  }
}

function drawBossAttacks() {
  if (!bossAI.attack) return;
  const def = ATTACKS[bossAI.attack];
  if (def && def.draw) def.draw();
}

function updateBullets(dt) {
  // Player bullets â travel up, despawn off-screen
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.y += b.vy * dt;
    if (b.y < -10) playerBullets.splice(i, 1);
  }
  // Enemy bullets â travel along their velocity vector
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += (b.vx || 0) * dt;
    b.y += (b.vy || 0) * dt;
    // Lifespan tick â bullets with a `life` property despawn when it
    // hits zero (used for fading trails).
    if (b.life != null) {
      b.life -= dt;
      if (b.life <= 0) { enemyBullets.splice(i, 1); continue; }
    }
    if (b.x < -20 || b.x > CANVAS_W + 20 || b.y < -20 || b.y > CANVAS_H + 20) {
      enemyBullets.splice(i, 1);
    }
  }
}

function checkCollisions() {
  // Suppressed entirely while a cutscene or the defeat sequence is
  // running â defense in depth on top of the main-loop branching.
  if (cutscene.active || defeatSeq.active) return;

  // Player bullets vs boss (rect)
  if (!boss.invincible) {
    const bx = boss.x - BOSS_W / 2;
    const by = boss.y - BOSS_H / 2;
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const b = playerBullets[i];
      if (!b) continue;
      if (pointInRect(b.x, b.y, bx, by, BOSS_W, BOSS_H)) {
        playerBullets.splice(i, 1);
        boss.hp -= 1;
        boss.flashTimer = 0.08;
        if (boss.hp <= 0) {
          boss.hp = 0;
          if (game.phase === 1) {
            // Player melted Phase 1 before the HP-threshold check
            // could trigger â route into Phase 1 â 2 anyway.
            game.phase = 1.5;
            enemyBullets.length = 0;
            boss.hp = 1;
            playCutscene(getPhase1To2(), () => {
              startPhase(2);
              startPhase2();
            });
          } else if (game.phase === 2) {
            // Phase 2 ends here â the final auto-fire hit triggers
            // the Phase 2 â 3 cutscene rather than defeat.
            game.phase = 2.5;
            enemyBullets.length = 0;
            playCutscene(getPhase2To3(), () => {
              startPhase(3);
              resetBossAI();
              startPhase3();
            });
          } else if (game.phase === 3) {
            // Phase 3 boss death â theatrical defeat with reboot.
            startDefeatSequence();
          } else {
            // Mid-transition (1.5 / 2.5) â let the cutscene complete.
          }
          // Cutscene/defeat now owns the frame â bail out of the
          // collision loop so we don't keep iterating over an
          // already-cleared bullet array.
          return;
        }
      }
    }
  }

  // Enemy bullets vs player hitbox (square, with bullet radius)
  if (!player.invincible && player.iframes <= 0 && !game.over) {
    const half = PLAYER_HITBOX / 2;
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      if (b.harmless) continue;
      // Closest-point on the square to the bullet center.
      const cx = clamp(b.x, player.x - half, player.x + half);
      const cy = clamp(b.y, player.y - half, player.y + half);
      const dx = b.x - cx, dy = b.y - cy;
      const r = b.r || ENEMY_BULLET_R;
      if (dx * dx + dy * dy > r * r) continue;

      // GREEN: directional shield. Determine which side the bullet
      // is approaching from (dominant axis of its velocity); if that
      // matches the shield direction, the bullet is consumed without
      // damage. Otherwise it hits normally.
      if (player.state === S_GREEN) {
        const ax = Math.abs(b.vx || 0);
        const ay = Math.abs(b.vy || 0);
        let approach;
        if (ax > ay) {
          approach = (b.vx || 0) > 0 ? 'left' : 'right';
        } else {
          approach = (b.vy || 0) >= 0 ? 'up' : 'down';
        }
        if (approach === player.shieldDir) {
          enemyBullets.splice(i, 1);
          continue;
        }
      }

      enemyBullets.splice(i, 1);
      player.hp -= 1;
      player.iframes = POST_HIT_IFRAMES;
      if (player.hp <= 0) {
        player.hp = 0;
        killPlayer();
        break;
      }
    }
  }
}

function updateCutscene(dt) {
  if (!cutscene.active) return;
  const line = cutscene.lines[cutscene.index];
  if (!line) return;
  const pageText = _currentPageText();

  if (!cutscene.done) {
    if (line.silent) {
      // Silent lines complete instantly; the pauseAfter handles the beat.
      cutscene.charT = 0;
      cutscene.done = true;
      cutscene.holdT = 0;
    } else {
      const cps = line.typingCps || CUTSCENE_TYPING_CPS;
      cutscene.charT += cps * dt;
      if (cutscene.charT >= pageText.length) {
        cutscene.charT = pageText.length;
        cutscene.done = true;
        cutscene.holdT = 0;
      }
    }
    return;
  }

  // Page finished. Advance the post-page hold timer. Silent lines
  // auto-advance once their hold expires; spoken lines wait for the
  // player to advance.
  cutscene.holdT += dt;
  const lastPage = _isLastPage();
  if (line.silent) {
    const need = line.pauseAfter || 0.8;
    if (cutscene.holdT >= need) {
      cutscene.index += 1;
      if (cutscene.index >= cutscene.lines.length) {
        endCutscene();
      } else {
        _enterCutsceneLine();
      }
    }
  } else if (line.pauseAfter && line.speaker === 'red'
             && cutscene.index === cutscene.lines.length - 1
             && lastPage) {
    // Final defeat line auto-advances after its pauseAfter (last page).
    if (cutscene.holdT >= line.pauseAfter) {
      cutscene.index += 1;
      if (cutscene.index >= cutscene.lines.length) endCutscene();
    }
  }
}

function updateNowPlaying(dt) {
  if (!nowPlaying.active) return;
  nowPlaying.timer -= dt;
  if (nowPlaying.timer <= 0) nowPlaying.active = false;
}

function updateStars(dt) {
  for (const s of stars) {
    s.twinkle += dt * s.speed;
  }
}

// ---------- Render ----------
function drawStars() {
  for (const s of stars) {
    const alpha = 0.5 + 0.5 * Math.sin(s.twinkle);
    ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }
}

function drawArena() {
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#ffffff';
  ctx.strokeRect(ARENA.x + 0.5, ARENA.y + 0.5, ARENA.w, ARENA.h);

  // PURPLE: render the 4 horizontal lanes the player can traverse.
  if (player.state === S_PURPLE) {
    ctx.save();
    ctx.strokeStyle = 'rgba(200, 100, 255, 0.55)';
    ctx.lineWidth = 1;
    for (let i = 0; i < PURPLE_LINES; i++) {
      const ly = Math.round(purpleLineY(i)) + 0.5;
      ctx.beginPath();
      ctx.moveTo(ARENA.x + 4,           ly);
      ctx.lineTo(ARENA.x + ARENA.w - 4, ly);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawEarth(x, y) {
  // Ocean
  ctx.fillStyle = '#1565c0';
  ctx.beginPath();
  ctx.arc(x, y, PLAYER_VISUAL_R, 0, Math.PI * 2);
  ctx.fill();
  // Continents (rough green blobs)
  ctx.fillStyle = '#2e7d32';
  ctx.beginPath();
  ctx.ellipse(x - PLAYER_VISUAL_R * 0.35, y - PLAYER_VISUAL_R * 0.2,
              PLAYER_VISUAL_R * 0.4, PLAYER_VISUAL_R * 0.28, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + PLAYER_VISUAL_R * 0.15, y + PLAYER_VISUAL_R * 0.25,
              PLAYER_VISUAL_R * 0.32, PLAYER_VISUAL_R * 0.42, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + PLAYER_VISUAL_R * 0.4, y - PLAYER_VISUAL_R * 0.15,
              PLAYER_VISUAL_R * 0.3, PLAYER_VISUAL_R * 0.22, 0.1, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlayer() {
  // I-frames: blink the sprite
  const showSprite = player.iframes <= 0 || (Math.floor(player.iframes * 16) % 2 === 0);
  if (showSprite) drawEarth(player.x, player.y);

  // GREEN state: directional shield arc on the chosen side.
  if (player.state === S_GREEN) {
    // Canvas angles: 0 = +x (right), PI/2 = +y (down), PI = left,
    // 3PI/2 = up. Center the arc on the chosen side.
    const center = {
      right: 0,
      down:  Math.PI / 2,
      left:  Math.PI,
      up:    3 * Math.PI / 2,
    }[player.shieldDir];
    const half = GREEN_SHIELD_ARC / 2;
    const start = center - half;
    const end   = center + half;

    ctx.save();
    // Outer glow
    ctx.strokeStyle = 'rgba(80, 255, 120, 0.25)';
    ctx.lineWidth = 9;
    ctx.beginPath();
    ctx.arc(player.x, player.y, GREEN_SHIELD_R, start, end);
    ctx.stroke();
    // Inner stroke
    ctx.strokeStyle = 'rgba(140, 255, 170, 0.95)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(player.x, player.y, GREEN_SHIELD_R, start, end);
    ctx.stroke();
    ctx.restore();
  }

  // State outline (the visual hitbox).
  ctx.save();
  ctx.lineWidth = 2;
  ctx.strokeStyle = STATE_COLORS[player.state];
  const half = PLAYER_HITBOX / 2;
  ctx.strokeRect(
    Math.round(player.x - half) + 0.5,
    Math.round(player.y - half) + 0.5,
    PLAYER_HITBOX,
    PLAYER_HITBOX,
  );
  ctx.restore();
}

function drawBoss() {
  // Smog aura â soft purple radial glow
  const grad = ctx.createRadialGradient(boss.x, boss.y, 4, boss.x, boss.y, BOSS_W);
  grad.addColorStop(0, 'rgba(110, 30, 150, 0.7)');
  grad.addColorStop(1, 'rgba(110, 30, 150, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(boss.x - BOSS_W, boss.y - BOSS_H, BOSS_W * 2, BOSS_H * 2);

  // Body â humanoid figure built out of small green tiles.
  // Pattern (1 = tile):
  //   ..##....##..
  //   ..####.####.
  //   ..##########
  //   .############
  //   .##########..
  //   ..########..
  //   ...######...
  //   ...##..##...
  const TILE = 8;
  const pattern = [
    "..##....##..",
    "..####.####.",
    "..##########",
    ".############",
    ".##########..",
    "..########..",
    "...######...",
    "...##..##...",
  ];
  const pw = pattern[0].length * TILE;
  const ph = pattern.length * TILE;
  const ox = Math.round(boss.x - pw / 2);
  const oy = Math.round(boss.y - ph / 2);

  const flash = boss.flashTimer > 0;
  for (let row = 0; row < pattern.length; row++) {
    for (let col = 0; col < pattern[row].length; col++) {
      if (pattern[row][col] === '#') {
        ctx.fillStyle = flash ? '#ffffff' : '#3aa53a';
        ctx.fillRect(ox + col * TILE, oy + row * TILE, TILE, TILE);
        // tile shading
        if (!flash) {
          ctx.fillStyle = '#2c7c2c';
          ctx.fillRect(ox + col * TILE, oy + row * TILE + TILE - 2, TILE, 2);
          ctx.fillRect(ox + col * TILE + TILE - 2, oy + row * TILE, 2, TILE);
        }
      }
    }
  }
  // Glowing red eyes
  ctx.fillStyle = '#ff3030';
  ctx.fillRect(ox + 3 * TILE + 2, oy + 1 * TILE + 2, 2, 2);
  ctx.fillRect(ox + 8 * TILE + 2, oy + 1 * TILE + 2, 2, 2);
}

function drawBullets() {
  // Player bullets â bright cyan
  ctx.fillStyle = '#bff7ff';
  for (const b of playerBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, PLAYER_BULLET_R, 0, Math.PI * 2);
    ctx.fill();
  }
  // Player bullet glow
  ctx.fillStyle = 'rgba(180, 230, 255, 0.4)';
  for (const b of playerBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, PLAYER_BULLET_R + 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemy bullets â purple smog orbs
  for (const b of enemyBullets) {
    const r = b.r || ENEMY_BULLET_R;
    const c = b.color || '#c845ff';
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(200, 70, 255, 0.35)';
    ctx.beginPath();
    ctx.arc(b.x, b.y, r + 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHUD() {
  // Player HP
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 20, CANVAS_H - 22);
  for (let i = 0; i < player.maxHp; i++) {
    const x = 50 + i * 18;
    const y = CANVAS_H - 32;
    ctx.fillStyle = i < player.hp ? '#ff3344' : '#552222';
    ctx.fillRect(x, y, 14, 14);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, 14, 14);
  }

  // Boss HP bar (top)
  const bossBarW = 360;
  const bossBarH = 8;
  const bx = (CANVAS_W - bossBarW) / 2;
  const by = 10;
  ctx.fillStyle = '#330033';
  ctx.fillRect(bx, by, bossBarW, bossBarH);
  ctx.fillStyle = '#aa44ff';
  ctx.fillRect(bx, by, bossBarW * (boss.hp / boss.maxHp), bossBarH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx + 0.5, by + 0.5, bossBarW, bossBarH);
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('POLLUTION MAN', CANVAS_W / 2, by - 1);

  // State label
  ctx.font = '12px "Courier New", monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = STATE_COLORS[player.state];
  ctx.fillText('[' + player.state.toUpperCase() + ']', CANVAS_W - 20, CANVAS_H - 22);
}

function drawTextBox(speaker, text, fullText, glitch, isLastPage) {
  if (speaker === 'red') { drawRedBox(text, fullText, isLastPage); return; }

  // Position: above arena for boss, below arena for player.
  const isBoss = speaker === 'boss';
  const w = TEXT_BOX_W;
  const h = TEXT_BOX_H;
  const x = (CANVAS_W - w) / 2;
  let y = isBoss ? ARENA.y - h - 14 : ARENA.y + ARENA.h + 14;
  // Clamp player text box to canvas bounds.
  if (!isBoss) y = Math.min(y, CANVAS_H - h - 8);

  // Backing
  ctx.fillStyle = 'rgba(0, 0, 0, 0.92)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 0.5, y + 0.5, w, h);

  // Speaker label
  ctx.font = 'bold 12px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = isBoss ? '#c845ff' : '#3a9bff';
  ctx.fillText(isBoss ? 'POLLUTION MAN' : 'CAPTAIN PLANET', x + 10, y + 18);

  // Text â pages are pre-wrapped; render each line of the page.
  ctx.font = TEXT_BOX_FONT;
  ctx.fillStyle = '#ffffff';
  const pageLines = text.split('\n');
  for (let i = 0; i < pageLines.length; i++) {
    ctx.fillText(pageLines[i], x + TEXT_BOX_PAD,
                 y + 36 + i * TEXT_BOX_LINE_H);
  }

  // Continue indicator: â¶ if more pages remain, â¼ for the final page.
  if (text.length === fullText.length) {
    ctx.fillStyle = '#ffd900';
    const t = performance.now() / 250;
    const blink = Math.sin(t) > 0;
    const ind = blink ? (isLastPage ? 'â¼' : 'â¶') : ' ';
    ctx.font = '14px "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(ind, x + w - 10, y + h - 8);
  }
}

function drawCutscene() {
  if (!cutscene.active) return;
  const line = cutscene.lines[cutscene.index];
  if (!line) return;
  if (line.silent) return; // empty held beat
  const pageText = _currentPageText();
  const shown = pageText.slice(0, Math.floor(cutscene.charT));
  drawTextBox(line.speaker, shown, pageText, line.glitch, _isLastPage());
}

// "[RED]: ..." takeover lines get raw red text on a black wash â
// no rounded box, no speaker label. Slight jitter for menace. Pages
// are pre-wrapped; render each line stacked.
function drawRedBox(text, fullText, isLastPage) {
  ctx.save();
  // Vertical wash sized for up to 2 lines of red text.
  const washTop = ARENA.y - 110;
  const washH   = 130;
  ctx.fillStyle = 'rgba(40, 0, 0, 0.55)';
  ctx.fillRect(0, washTop, CANVAS_W, washH);

  ctx.font = RED_BOX_FONT;
  ctx.fillStyle = '#ff2828';
  ctx.textAlign = 'center';
  const sx = (Math.random() - 0.5) * 1.6;
  const sy = (Math.random() - 0.5) * 1.4;
  const pageLines = text.split('\n');
  const block = pageLines.length * RED_BOX_LINE_H;
  // Vertically center the block within the wash, but anchor near
  // the bottom so the indicator has room.
  const anchorY = washTop + (washH - block) / 2 + RED_BOX_LINE_H - 4;
  for (let i = 0; i < pageLines.length; i++) {
    ctx.fillText(pageLines[i],
                 CANVAS_W / 2 + sx,
                 anchorY + i * RED_BOX_LINE_H + sy);
  }

  // Continue indicator once page fully revealed.
  if (text.length === fullText.length) {
    ctx.font = '16px "Courier New", monospace';
    ctx.fillStyle = '#ff5050';
    const t = performance.now() / 250;
    const blink = Math.sin(t) > 0;
    const ind = blink ? (isLastPage ? 'â¼' : 'â¶') : ' ';
    ctx.textAlign = 'right';
    ctx.fillText(ind, CANVAS_W - 30, washTop + washH - 8);
  }
  ctx.restore();
}

// Top-left "Now playing:" banner â chunky 8-bit feel, fades out.
function drawNowPlaying() {
  if (!nowPlaying.active) return;
  let alpha = 1;
  if (nowPlaying.timer < 0.6) alpha = Math.max(0, nowPlaying.timer / 0.6);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 11px "Courier New", monospace';
  ctx.textAlign = 'left';
  // Background panel
  const labelW = ctx.measureText('NOW PLAYING:').width;
  const songW  = ctx.measureText(nowPlaying.text).width;
  const panelW = Math.max(labelW, songW) + 16;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(8, 8, panelW, 36);
  ctx.strokeStyle = '#ffd900';
  ctx.lineWidth = 1;
  ctx.strokeRect(8.5, 8.5, panelW, 36);
  // Label
  ctx.fillStyle = '#ffd900';
  ctx.fillText('NOW PLAYING:', 16, 22);
  // Song name
  ctx.fillStyle = '#ffffff';
  ctx.fillText(nowPlaying.text, 16, 36);
  ctx.restore();
}

function drawOverlay(text, sub) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.font = 'bold 32px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd900';
  ctx.fillText(text, CANVAS_W / 2, CANVAS_H / 2 - 8);
  if (sub) {
    ctx.font = '14px "Courier New", monospace';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(sub, CANVAS_W / 2, CANVAS_H / 2 + 22);
  }
}

function drawSoulSwitch() {
  if (!bossAI || bossAI.soulSwitchT <= 0 || !bossAI.soulSwitchTo) return;
  const t = bossAI.soulSwitchT;            // counts down from 1
  const progress = 1 - t;                  // 0 â 1
  const color = STATE_COLORS[bossAI.soulSwitchTo];
  // Fade-in flash that peaks halfway.
  const a = 0.55 * (1 - Math.abs(progress - 0.5) * 2);
  ctx.save();
  ctx.fillStyle = hexA(color, Math.max(0.2, a));
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.font = 'bold 28px "Courier New", monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(bossAI.soulSwitchTo.toUpperCase() + ' SOUL',
               CANVAS_W / 2, CANVAS_H / 2);
  if (!bossAI.soulNamedShown[bossAI.soulSwitchTo]) {
    ctx.font = '12px "Courier New", monospace';
    ctx.fillStyle = '#ffffff';
    const sub = {
      red:    'free movement',
      blue:   'gravity + jump',
      purple: 'rail-locked',
      green:  'directional shield',
    }[bossAI.soulSwitchTo] || '';
    ctx.fillText(sub, CANVAS_W / 2, CANVAS_H / 2 + 22);
  }
  ctx.restore();
}

function drawGauntletIntro() {
  if (!bossAI || !bossAI.gauntletTriggered || bossAI.gauntletPhase !== 'intro') return;
  const t = bossAI.gauntletT;
  ctx.save();
  // Slot-machine cycle through colors.
  const idx = Math.floor(t * 14) % 4;
  const c = STATE_COLORS[SOUL_ORDER[idx]];
  ctx.fillStyle = hexA(c, 0.55);
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.font = 'bold 24px "Courier New", monospace';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText('TAKE EVERYTHING I\'VE GOT', CANVAS_W / 2, CANVAS_H / 2);
  ctx.restore();
}

function drawGauntletSilence() {
  if (!bossAI || bossAI.gauntletPhase !== 'silence') return;
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.restore();
}

// Convert a hex color "#rrggbb" to "rgba(r,g,b,a)".
function hexA(hex, a) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a.toFixed(2) + ')';
}

function render() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // INVERSION (Phase 3 modifier) flips the entire frame.
  const inverted = isInverted();
  if (inverted) {
    ctx.save();
    ctx.translate(CANVAS_W, CANVAS_H);
    ctx.scale(-1, -1);
  }

  drawStars();
  drawBoss();
  drawArena();
  drawBossAttacks();
  drawPhase3Attacks();
  drawPlayer();
  drawBullets();
  drawPhase3Modifier();

  if (inverted) ctx.restore();

  // HUD and overlays render right-side-up regardless of inversion.
  drawHUD();
  drawSoulSwitch();
  drawGauntletIntro();
  drawGauntletSilence();
  drawPhase3Bark();
  drawErrorFlood();
  drawCutscene();
  drawNowPlaying();
  drawDefeatSequence();

  if (game.over) {
    drawOverlay('GAME OVER', 'Press SPACE to retry');
  } else if (game.victory && !defeatSeq.active) {
    drawOverlay('VICTORY!', 'Press SPACE to play again');
  } else if (game.paused && !cutscene.active) {
    drawOverlay(
      game.introPlayed ? 'PAUSED' : 'PRESS SPACE TO BEGIN',
      game.introPlayed ? 'Press SPACE to resume' : null,
    );
  }
}

// ---------- Main loop ----------
let lastT = 0;
function frame(now) {
  if (!lastT) lastT = now;
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05; // clamp on tab-switch / breakpoint
  game.fpsAvg = game.fpsAvg * 0.95 + (1 / dt) * 0.05;

  updateStars(dt);
  updateNowPlaying(dt);
  updatePhase3Bark(dt);
  updateDefeatSequence(dt);

  if (cutscene.active) {
    updateCutscene(dt);
  } else if (defeatSeq.active) {
    // Defeat sequence runs to its own clock â no combat updates.
  } else if (phase3Bark.active && phase3Bark.pauseCombat) {
    // "please" bark pauses combat.
  } else if (!game.paused && !game.over && !game.victory) {
    updatePlayer(dt);
    updateBoss(dt);
    updateBullets(dt);
    checkCollisions();
  }

  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
