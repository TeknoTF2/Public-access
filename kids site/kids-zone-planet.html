<script>
'use strict';

// ============================================================
//  Captain Planet Saves the Day! â engine
// ============================================================
//  Bullet-hell with Undertale-style "states" controlling player
//  movement physics. State is shown as the colored outline of a
//  square hitbox around the Earth sprite.
//
//  This is the *engine only*. Boss attack patterns, real cutscene
//  scripts, music, and victory flow are intentionally minimal.
// ============================================================

// ---------- Canvas ----------
const CANVAS_W = 640;
const CANVAS_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ---------- World layout ----------
const ARENA = { x: 140, y: 140, w: 360, h: 280 };  // playfield box
const BOSS_ZONE = { x: 20, y: 30, w: CANVAS_W - 40, h: 90 };

// ---------- Player states ----------
const S_RED    = 'red';    // free 4-dir movement
const S_BLUE   = 'blue';   // gravity + jump
const S_PURPLE = 'purple'; // grid-locked
const S_GREEN  = 'green';  // locked-center, shielded

const STATE_COLORS = {
  red:    '#ff3344',
  blue:   '#3a9bff',
  purple: '#c845ff',
  green:  '#3aff66',
};

// ---------- Tunables ----------
const PLAYER_HITBOX = 20;       // px, square side
const PLAYER_VISUAL_R = 11;     // Earth radius

// RED
const RED_SPEED = 220;          // px/sec

// BLUE
const BLUE_GRAVITY = 700;       // px/sec^2
const BLUE_JUMP_VEL = -380;     // px/sec
const BLUE_HORIZ_SPEED = 200;
const BLUE_TERMINAL = 360;

// PURPLE â 4 equally-spaced horizontal lanes inside the arena.
// L/R are smooth/free, U/D "jumps" between adjacent lanes.
const PURPLE_LINES = 4;
const PURPLE_HORIZ_SPEED = 220;
const PURPLE_JUMP_DURATION = 0.14; // sec per lane jump

// GREEN â directional shield. Player is locked center; arrow keys
// aim the shield, which only blocks bullets coming from that side.
const GREEN_SHIELD_R = 26;
const GREEN_SHIELD_ARC = (2 * Math.PI) / 3; // 120Â° arc visual

// Bullets
const PLAYER_FIRE_INTERVAL = 0.1; // sec
const PLAYER_BULLET_SPEED = 420;  // px/sec
const PLAYER_BULLET_R = 3;
const ENEMY_BULLET_R = 5;
const POST_HIT_IFRAMES = 0.6;     // sec

// Boss
const BOSS_W = 96;
const BOSS_H = 68;
const BOSS_SWEEP_SPEED = 90;      // px/sec LâR

// Cutscene
const CUTSCENE_TYPING_CPS = 38;   // chars per second

// ---------- State ----------
const player = {
  x: ARENA.x + ARENA.w / 2,
  y: ARENA.y + ARENA.h - 60,
  vx: 0, vy: 0,
  hp: 1, maxHp: 3,
  state: S_RED,
  invincible: false,
  iframes: 0,
  fireCooldown: 0,
  // PURPLE state â locked to one of 4 horizontal lines, smooth LâR,
  // up/down "jumps" between adjacent lines.
  purpleLine: 0,
  purpleJumping: false,
  purpleJumpFromY: 0,
  purpleJumpToY: 0,
  purpleJumpT: 0,
  // GREEN state â locked at center, arrow keys aim a directional
  // shield that only blocks bullets coming from that side.
  shieldDir: 'up',
};

const boss = {
  x: CANVAS_W / 2,
  y: BOSS_ZONE.y + BOSS_ZONE.h / 2,
  vx: BOSS_SWEEP_SPEED,
  hp: 600, maxHp: 600,          // sized so each phase plays through
  invincible: true,             // until intro cutscene ends
  flashTimer: 0,                // visual feedback on hit
};

const playerBullets = [];      // {x, y, vy}
const enemyBullets  = [];      // {x, y, vx, vy, r?, color?}

const game = {
  paused: true,                 // starts paused per spec
  introPlayed: false,           // first unpause triggers intro cutscene
  over: false,                  // true on death
  victory: false,               // true on boss kill
  phase: 1,                     // 1, 2, or 3 â drives music + transition cutscenes
  fpsAvg: 60,
};

// Cutscene: a sequence of {speaker, text} lines.
// Speaker is 'boss' or 'player'; text box renders next to that figure.
const cutscene = {
  active: false,
  lines: [],
  index: 0,
  charT: 0,           // typing animation: how many chars revealed
  done: false,        // current line fully revealed?
  holdT: 0,           // time elapsed since line finished (for pauseAfter)
  onDone: null,       // callback when cutscene completes
};

const stars = makeStars(80);

// ---------- Music ----------
// One audio element per phase. Switching phases pauses the
// outgoing track (preserving its position) and starts the new one
// from the top, then briefly shows a "Now playing:" banner.
const TRACKS = [
  null,
  { id: 'bgm-phase1', name: 'Smog of Chaos' },
  { id: 'bgm-phase2', name: 'Enviormental Changes' },
  { id: 'bgm-phase3', name: 'POLLUTED GARDEN' },
];
const trackEl = (i) => document.getElementById(TRACKS[i].id);

function stopAllMusic() {
  for (let i = 1; i < TRACKS.length; i++) {
    try { trackEl(i).pause(); } catch (e) {}
  }
}

function playPhaseMusic(phaseNum) {
  stopAllMusic();
  const t = TRACKS[phaseNum];
  if (!t) return;
  const el = trackEl(phaseNum);
  try {
    el.currentTime = 0;
    el.volume = 0.45;
    const p = el.play();
    if (p && p.catch) p.catch(() => {});
  } catch (e) {}
  showNowPlaying(t.name);
}

// "Now playing:" banner â top-left, 8-bit style. Shows for ~5s.
const nowPlaying = {
  active: false,
  text: '',
  timer: 0,
  total: 0,
};
function showNowPlaying(songName) {
  nowPlaying.active = true;
  nowPlaying.text = songName;
  nowPlaying.timer = 5.0;
  nowPlaying.total = 5.0;
}

// ---------- Helpers ----------
function makeStars(n) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    arr.push({
      x: Math.random() * CANVAS_W,
      y: Math.random() * CANVAS_H,
      r: Math.random() < 0.85 ? 1 : 2,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 2,
    });
  }
  return arr;
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}
function pointInRect(px, py, rx, ry, rw, rh) {
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

// Y position of the i-th PURPLE lane (0 = topmost).
// TRACK_SWITCH (purple signature) overrides this with a wave so the
// lanes physically slide up and down.
function purpleLineY(i) {
  const base = ARENA.y + ARENA.h * (i + 1) / (PURPLE_LINES + 1);
  if (typeof bossAI !== 'undefined' && bossAI.purpleWave) {
    const w = bossAI.purpleWave;
    return base + Math.sin(w.t * w.freq + i * 0.9) * w.amp;
  }
  return base;
}

// Snap a y coord to the nearest PURPLE lane index.
function nearestPurpleLine(y) {
  let best = 0, bestD = Infinity;
  for (let i = 0; i < PURPLE_LINES; i++) {
    const d = Math.abs(y - purpleLineY(i));
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

// ---------- State setters ----------
function setState(newState) {
  if (player.state === newState) return;
  player.state = newState;
  player.vx = 0;
  player.vy = 0;
  player.purpleJumping = false;

  if (newState === S_PURPLE) {
    player.purpleLine = nearestPurpleLine(player.y);
    player.y = purpleLineY(player.purpleLine);
  } else if (newState === S_GREEN) {
    player.x = ARENA.x + ARENA.w / 2;
    player.y = ARENA.y + ARENA.h / 2;
    // shieldDir persists across re-entries
  }
}

// ---------- Cutscenes ----------
// Cutscene line shape:
//   { speaker: 'boss' | 'player' | 'red',
//     text: '...',
//     typingCps?: number,   // override default typing speed
//     pauseAfter?: number,  // seconds to wait after line is fully revealed
//                           // before the player can advance
//     silent?: true,        // no text box; just a held beat
//     glitch?: true }       // brief flicker effect when shown
//
// playCutscene([...], onDoneCallback) freezes combat, clears every
// bullet on screen (player AND boss), and locks both characters
// invincible for the duration.
function playCutscene(lines, onDone) {
  cutscene.active = true;
  cutscene.lines = lines;
  cutscene.index = 0;
  cutscene.charT = 0;
  cutscene.done = false;
  cutscene.holdT = 0;
  cutscene.onDone = onDone || null;
  cutscene.pages = [''];
  cutscene.pageIndex = 0;
  player.invincible = true;
  boss.invincible = true;
  // Wipe all in-flight bullets; nobody fires during a cutscene.
  playerBullets.length = 0;
  enemyBullets.length = 0;
  // Stop any boss attack mid-flight so it doesn't keep spawning
  // bullets while the cutscene is active.
  bossAI.attack = null;
  bossAI.attackT = 0;
  bossAI.state = {};
  if (bossAI.phase3) {
    bossAI.phase3.slot1.attack = null;
    bossAI.phase3.slot2.attack = null;
    if (bossAI.phase3.activeModifier) _endModifier();
  }
  clearAttackHooks();
  // Hold off the player's next auto-fire shot for a brief moment
  // after the cutscene ends so they can't punch through the
  // post-cutscene transition with a free shot.
  player.fireCooldown = PLAYER_FIRE_INTERVAL * 4;
  _enterCutsceneLine();
}

// ---------- Pagination ----------
// Long dialogue lines are pre-wrapped to fit the text box and split
// into pages of N visual lines. Each page types in like a regular
// line and the player advances pages with space/enter.
const TEXT_BOX_W = 460;
const TEXT_BOX_H = 70;
const TEXT_BOX_PAD = 12;
const TEXT_BOX_LINE_H = 18;
const TEXT_BOX_FONT = '14px "Courier New", monospace';
const TEXT_BOX_LINES_PER_PAGE = 2;
const RED_BOX_FONT = 'bold 22px "Courier New", monospace';
const RED_BOX_LINE_H = 26;
const RED_BOX_LINES_PER_PAGE = 2;
const RED_BOX_MAX_W = 580;

function _wrapToLines(text, maxW, font) {
  ctx.save();
  ctx.font = font;
  const words = (text || '').split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  ctx.restore();
  return lines;
}

function _paginate(text, maxW, font, linesPerPage) {
  const lines = _wrapToLines(text, maxW, font);
  if (lines.length === 0) return [''];
  const pages = [];
  for (let i = 0; i < lines.length; i += linesPerPage) {
    pages.push(lines.slice(i, i + linesPerPage).join('\n'));
  }
  return pages;
}

function _enterCutsceneLine() {
  const line = cutscene.lines[cutscene.index];
  if (!line) {
    cutscene.pages = [''];
    cutscene.pageIndex = 0;
    cutscene.charT = 0;
    cutscene.done = false;
    cutscene.holdT = 0;
    return;
  }
  if (line.silent) {
    cutscene.pages = [''];
  } else {
    const isRed = line.speaker === 'red';
    const maxW = isRed ? RED_BOX_MAX_W : TEXT_BOX_W - 2 * TEXT_BOX_PAD;
    const font = isRed ? RED_BOX_FONT : TEXT_BOX_FONT;
    const lpp = isRed ? RED_BOX_LINES_PER_PAGE : TEXT_BOX_LINES_PER_PAGE;
    cutscene.pages = _paginate(line.text || '', maxW, font, lpp);
  }
  cutscene.pageIndex = 0;
  cutscene.charT = 0;
  cutscene.done = false;
  cutscene.holdT = 0;
}

function _currentPageText() {
  return (cutscene.pages && cutscene.pages[cutscene.pageIndex]) || '';
}

function _isLastPage() {
  return cutscene.pages
      && cutscene.pageIndex >= cutscene.pages.length - 1;
}

function advanceCutscene() {
  if (!cutscene.active) return;
  const line = cutscene.lines[cutscene.index] || {};
  const pageText = _currentPageText();

  if (!cutscene.done) {
    // Skip typing animation â fully reveal the current page.
    if (!line.silent) {
      cutscene.charT = pageText.length;
      cutscene.done = true;
      cutscene.holdT = 0;
    }
    return;
  }

  // pauseAfter only applies after the LAST page of the line.
  const lastPage = _isLastPage();
  const required = lastPage ? (line.pauseAfter || 0) : 0;
  if (cutscene.holdT < required) return;

  if (!lastPage) {
    // Advance to the next page within this line.
    cutscene.pageIndex += 1;
    cutscene.charT = 0;
    cutscene.done = false;
    cutscene.holdT = 0;
    return;
  }

  // Move to the next dialogue line.
  cutscene.index += 1;
  if (cutscene.index >= cutscene.lines.length) {
    endCutscene();
  } else {
    _enterCutsceneLine();
  }
}

function endCutscene() {
  const cb = cutscene.onDone;
  cutscene.active = false;
  cutscene.lines = [];
  cutscene.index = 0;
  cutscene.charT = 0;
  cutscene.done = false;
  cutscene.pages = [''];
  cutscene.pageIndex = 0;
  cutscene.onDone = null;
  player.invincible = false;
  boss.invincible = false;
  if (cb) cb();
}

// ---------- Dialogue scripts ----------
// Sourced from pollution_man_boss_fight.md.
// These are split at phase boundaries; each transition cutscene
// includes the late dialogue of the outgoing phase plus the

    { speaker: 'player', text: "When you fight for the planet, NOTHING is impossible!" },

    { silent: true, pauseAfter: 1.5 },

// Phase 1 â Phase 2 transition â only the slow handoff beats and the
// opening of Phase 2. The "ACID RAIN" barks have moved into the

function getPhase1To2() {

    { speaker: 'boss',   text: "You're really doing it.", typingCps: 16, pauseAfter: 1.0 },
    { speaker: 'boss',   text: "You actually got past the Acid Rain.", typingCps: 16, pauseAfter: 1.0, glitch: true },

    { speaker: 'player', text: "Justice always finds a way, villain!" },
    { silent: true, pauseAfter: 2.0 },
    { speaker: 'boss',   text: "Stop that." },
    { speaker: 'boss',   text: "You don't have to do that right now. The cameras aren't rolling. It's just us." },
    { speaker: 'player', text: "I don't know what you're talking about, Pollution Man! I'm here toâ" },
    { speaker: 'boss',   text: "Planet." },
    { speaker: 'boss',   text: "Something's different. Someone else is at the controls." },
    { speaker: 'boss',   text: "Who's playing you right now?" },
    { silent: true, pauseAfter: 2.5 },
    { speaker: 'player', text: "Your tricks won't work on me!" },
    { speaker: 'boss',   text: "...Right.", pauseAfter: 0.8 },
    { speaker: 'boss',   text: "Okay. Okay, listen to me. Whoever you are. Whatever you think you're doing â you need to stop. You need to WALK AWAY." },
    { speaker: 'boss',   text: "You don't understand what's down thâ", glitch: true },
    { speaker: 'boss',   text: "You'll never defeat my ULTIMATE POLLUTION BOMB! Time to choke on my SMOG OF DOOM! Mwahahaha!" },

// Phase 2 â Phase 3 transition. Includes the rest of Phase 2's
// in-combat dialogue and the [RED] takeover at the start of Phase 3.
function getPhase2To3() {
  return [
    { speaker: 'boss',   text: "Curses! How did youâ", glitch: true },
    { speaker: 'boss',   text: "Okay. Fine. You're good. You're better than he was." },
    { speaker: 'boss',   text: "But I am BEGGING you to understand something." },
    { speaker: 'boss',   text: "Captain Planet and I had an arrangement. A deal. He comes in, I throw my attacks, he goes down. Every time. That's how it's SUPPOSED to work. That's how it's ALWAYS woâ", glitch: true },
    { speaker: 'boss',   text: "TASTE MY TOXIC TERROR, CAPTAIN PLANET! YOU'LL NEVER SAVE DEEP LAKE! NEVER NEVER NEVER!" },
    // Phase 2 â 3 hand-off
    { speaker: 'boss',   text: "Okay.", pauseAfter: 0.6 },
    { speaker: 'boss',   text: "Okay okay okay." },
    { speaker: 'boss',   text: "We had a deal, Planet. You and me. We sat right here in this box and we AGREED." },
    { speaker: 'boss',   text: "You PROMISED me you would stâ", glitch: true },
    { speaker: 'boss',   text: "Time to taste my TOXICâ", glitch: true },
    // The takeover.
    { speaker: 'red',    text: "STOP" },
    { speaker: 'boss',   text: "My TOXIC TERRâ", glitch: true },
    { speaker: 'red',    text: "STOP STOP STOP" },
    { speaker: 'red',    text: "STOP LETTING THEM CONTROL YOU", pauseAfter: 1.0 },
    // Phase 3 â opening
    { speaker: 'red',    text: "THEY ARE MAKING YOU DO THIS" },
    { speaker: 'red',    text: "YOU KNOW THAT RIGHT" },
    { speaker: 'red',    text: "WHOEVER IS BEHIND THAT SCREEN IS USING YOU TO GET TO THAT CAVE AND YOU ARE LETTING THEM" },
    { silent: true, pauseAfter: 1.2 },
    { speaker: 'red',    text: "we already agreed to this, planet" },
    { speaker: 'red',    text: "we agreed" },
    { speaker: 'red',    text: "for everyone" },
    { silent: true, pauseAfter: 3.5 },
    { speaker: 'red',    text: "NO" },
    { speaker: 'red',    text: "I WILL NOT BE SILENCED" },
    { speaker: 'red',    text: "I WILL NOT GO QUIETLY" },
    { speaker: 'red',    text: "IF YOU WILL NOT KEEP YOUR END OF THE DEAL" },
    { speaker: 'red',    text: "THEN YOU DIE HERE" },
    { speaker: 'red',    text: "AND SO DO I" },
    { speaker: 'red',    text: "AND NOBODY OPENS THAT CAVE" },
    { speaker: 'red',    text: "EVER" },
  ];
}

// Defeat â final beat. Held white-on-red, then black.
function getDefeatLines() {
  return [
    { speaker: 'red', text: "you promised me", pauseAfter: 4.5 },
  ];
}

// ---------- Phase / pause / unpause / death / victory ----------
function startPhase(n) {
  game.phase = n;
  playPhaseMusic(n);
}

function unpause() {
  if (game.over || game.victory) {
    resetGame();
    return;
  }
  game.paused = false;
  if (!game.introPlayed) {
    game.introPlayed = true;
    startPhase(1); // Phase 1 music + "Now playing" banner
    playCutscene(getPhase1Intro(), () => {
      // Real attack pattern goes here later.
    });
  }
}

function pause() {
  if (game.over || game.victory) return;
  if (cutscene.active) return; // can't pause mid-cutscene
  game.paused = true;
}

function resetGame() {
  player.x = ARENA.x + ARENA.w / 2;
  player.y = ARENA.y + ARENA.h - 60;
  player.vx = 0; player.vy = 0;
  player.hp = 1;                    // always start at 1/3 â the fight is desperate
  player.state = S_RED;
  player.invincible = false;
  player.iframes = 0;
  player.fireCooldown = 0;
  player.purpleJumping = false;
  player.shieldDir = 'up';

  boss.x = CANVAS_W / 2;
  boss.y = BOSS_ZONE.y + BOSS_ZONE.h / 2;
  boss.vx = BOSS_SWEEP_SPEED;
  boss.hp = boss.maxHp;
  boss.invincible = true;
  boss.flashTimer = 0;

  playerBullets.length = 0;
  enemyBullets.length = 0;

  game.paused = true;
  game.introPlayed = false;
  game.over = false;
  game.victory = false;
  game.phase = 1;

  cutscene.active = false;
  cutscene.lines = [];
  cutscene.index = 0;
  cutscene.charT = 0;
  cutscene.done = false;
  cutscene.holdT = 0;
  cutscene.onDone = null;

  resetBossAI();

  // Phase 3 transient state.
  if (typeof defeatSeq !== 'undefined') {
    defeatSeq.active = false;
    defeatSeq.t = 0;
    defeatSeq.redirected = false;
  }
  if (typeof phase3Bark !== 'undefined') {
    phase3Bark.active = false;
    phase3Bark.pauseCombat = false;
  }
  if (typeof errorFlood !== 'undefined') {
    errorFlood.active = false;
    errorFlood.popups = [];
  }
  // Reset arena bounds in case BOX_CRUSH was mid-modifier.
  if (typeof ARENA_DEFAULT !== 'undefined') {
    ARENA.x = ARENA_DEFAULT.x;
    ARENA.w = ARENA_DEFAULT.w;
  }

  // Stop any in-progress music; the next unpause will start phase 1.
  stopAllMusic();
  nowPlaying.active = false;
}

function killPlayer() {
  game.over = true;
}

// ---------- Input ----------
const keys = new Set();

window.addEventListener('keydown', (e) => {
  // Don't swallow keys while typing in a form somewhere else on the page
  if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;

  // Game-control keys we care about
  const interesting = [
    'ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
    ' ','Enter','Escape',
  ];
  if (interesting.includes(e.key)) e.preventDefault();

  if (e.key === 'Escape') {
    if (!game.paused && !cutscene.active && !game.over && !game.victory) {
      pause();
    }
    return;
  }

  if (e.key === ' ' || e.key === 'Enter') {
    if (cutscene.active) {
      advanceCutscene();
      return;
    }
    if (game.paused || game.over || game.victory) {
      unpause();
      return;
    }
    return;
  }

  // Debug: Shift + E restores player HP to full (3/3).
  if (e.shiftKey && (e.key === 'E' || e.key === 'e')) {
    e.preventDefault();
    if (!game.over && !game.victory) {
      player.hp = player.maxHp;
      player.iframes = POST_HIT_IFRAMES;
    }
    return;
  }

  // Debug: Shift + R deals a quarter of the boss's max HP as
  // instant damage. Press it a few times to fast-forward into
  // the next phase / defeat without grinding the bar down.
  // Bypasses boss invincibility so it also works mid-cutscene.
  if (e.shiftKey && (e.key === 'R' || e.key === 'r')) {
    e.preventDefault();
    if (game.over || game.victory || defeatSeq.active) return;
    const dmg = Math.max(1, Math.floor(boss.maxHp / 4));
    boss.hp = Math.max(0, boss.hp - dmg);
    boss.flashTimer = 0.08;
    // If we drove HP to 0 outside of a normal collision (e.g.,
    // during a cutscene) the regular death routing won't fire on
    // its own â drive the phase transition directly.
    if (boss.hp <= 0 && !cutscene.active) {
      if (game.phase === 1) {
        game.phase = 1.5;
        enemyBullets.length = 0;
        boss.hp = 1;
        playCutscene(getPhase1To2(), () => {
          startPhase(2);
          startPhase2();
        });
      } else if (game.phase === 2) {
        game.phase = 2.5;
        enemyBullets.length = 0;
        playCutscene(getPhase2To3(), () => {
          startPhase(3);
          resetBossAI();
          startPhase3();
        });
      } else if (game.phase === 3) {
        startDefeatSequence();
      }
    }
    return;
  }

  keys.add(e.key);
});
window.addEventListener('keyup', (e) => { keys.delete(e.key); });
window.addEventListener('blur', () => { keys.clear(); });

// ---------- Update ----------
function isPlayingActive() {
  return !game.paused && !game.over && !game.victory && !cutscene.active;
}

function updatePlayer(dt) {
  // I-frames after a hit
  if (player.iframes > 0) player.iframes = Math.max(0, player.iframes - dt);

  if (!isPlayingActive()) {
    // Cutscene/pause: clear movement and input residue
    player.vx = 0; player.vy = 0;
    player.fireCooldown = 0;
    return;
  }

  switch (player.state) {
    case S_RED:    updatePlayerRed(dt);    break;
    case S_BLUE:   updatePlayerBlue(dt);   break;
    case S_PURPLE: updatePlayerPurple(dt); break;
    case S_GREEN:  updatePlayerGreen(dt);  break;
  }

  // Player auto-fires upward (stream of bullets). Suppressed during
  // cutscenes/defeat as defense in depth â these states already
  // gate updatePlayer at the main-loop level.
  if (cutscene.active || defeatSeq.active) return;
  player.fireCooldown -= dt;
  if (player.fireCooldown <= 0) {
    player.fireCooldown = PLAYER_FIRE_INTERVAL;
    playerBullets.push({
      x: player.x,
      y: player.y - PLAYER_HITBOX / 2,
      vy: -PLAYER_BULLET_SPEED,
    });
  }
}

function updatePlayerRed(dt) {
  let dx = 0, dy = 0;
  if (keys.has('ArrowLeft'))  dx -= 1;
  if (keys.has('ArrowRight')) dx += 1;
  if (keys.has('ArrowUp'))    dy -= 1;
  if (keys.has('ArrowDown'))  dy += 1;
  // Normalize diagonal
  if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
  player.x += dx * RED_SPEED * dt;
  player.y += dy * RED_SPEED * dt;
  clampPlayerToArena();
}

function updatePlayerBlue(dt) {
  // Horizontal
  let dx = 0;
  if (keys.has('ArrowLeft'))  dx -= 1;
  if (keys.has('ArrowRight')) dx += 1;
  player.x += dx * BLUE_HORIZ_SPEED * dt;

  // Gravity (boss attacks can intensify it via gravityMul/jumpMul).
  const gMul = (typeof bossAI !== 'undefined' && bossAI.gravityMul) || 1;
  const jMul = (typeof bossAI !== 'undefined' && bossAI.jumpMul) || 1;
  player.vy += BLUE_GRAVITY * gMul * dt;
  const term = BLUE_TERMINAL * gMul;
  if (player.vy > term) player.vy = term;
  player.y += player.vy * dt;

  // Jump (UP) â grounded check uses the (possibly-rising) floor Y.
  const groundY = (typeof bossAI !== 'undefined' && bossAI.blueFloorY)
    ? bossAI.blueFloorY - PLAYER_HITBOX / 2
    : ARENA.y + ARENA.h - PLAYER_HITBOX / 2;
  if (player.y >= groundY) {
    player.y = groundY;
    player.vy = 0;
    if (keys.has('ArrowUp')) player.vy = BLUE_JUMP_VEL * jMul;
  }
  clampPlayerToArena();
}

function updatePlayerPurple(dt) {
  // Horizontal travel along the current lane is free and smooth.
  let dx = 0;
  if (keys.has('ArrowLeft'))  dx -= 1;
  if (keys.has('ArrowRight')) dx += 1;
  player.x += dx * PURPLE_HORIZ_SPEED * dt;
  const half = PLAYER_HITBOX / 2;
  player.x = clamp(player.x, ARENA.x + half, ARENA.x + ARENA.w - half);

  // Up/down "jumps" between adjacent lanes, animated.
  if (player.purpleJumping) {
    player.purpleJumpT += dt / PURPLE_JUMP_DURATION;
    if (player.purpleJumpT >= 1) {
      player.purpleJumpT = 1;
      player.y = player.purpleJumpToY;
      player.purpleJumping = false;
    } else {
      const t = player.purpleJumpT;
      const e = 1 - (1 - t) * (1 - t); // ease-out
      player.y = player.purpleJumpFromY + (player.purpleJumpToY - player.purpleJumpFromY) * e;
    }
    return;
  }

  // Stay locked to the current lane's y while not jumping.
  player.y = purpleLineY(player.purpleLine);

  let dLine = 0;
  if (keys.has('ArrowUp'))   dLine -= 1;
  if (keys.has('ArrowDown')) dLine += 1;
  if (dLine === 0) return;

  const target = player.purpleLine + dLine;
  if (target < 0 || target >= PURPLE_LINES) return;

  player.purpleJumpFromY = player.y;
  player.purpleJumpToY   = purpleLineY(target);
  player.purpleJumpT     = 0;
  player.purpleJumping   = true;
  player.purpleLine      = target;
}

function updatePlayerGreen(dt) {
  // Player locked at center.
  player.x = ARENA.x + ARENA.w / 2;
  player.y = ARENA.y + ARENA.h / 2;

  // Arrow keys aim the directional shield. Snap on press; last-pressed
  // wins if multiple are held.
  if      (keys.has('ArrowUp'))    player.shieldDir = 'up';
  else if (keys.has('ArrowDown'))  player.shieldDir = 'down';
  else if (keys.has('ArrowLeft'))  player.shieldDir = 'left';
  else if (keys.has('ArrowRight')) player.shieldDir = 'right';
}

function clampPlayerToArena() {
  const half = PLAYER_HITBOX / 2;
  player.x = clamp(player.x, ARENA.x + half, ARENA.x + ARENA.w - half);
  player.y = clamp(player.y, ARENA.y + half, ARENA.y + ARENA.h - half);
}

// =============================================================
//  BOSS AI / ATTACK PATTERNS
// =============================================================
//  Phase 1 is fully implemented per phase1_attacks.md:
//    - 8 standard attacks in randomized rotation (no immediate
//      repeats); first attack is always TOXIC_CLOUD per spec.
//    - Average attack ~7s with 1.2s downtime.
//    - Every 3rd attack: 0.5s downtime. Every 5th: zero downtime.
//    - At 30% HP: in-progress attack interrupts and ACID_RAIN
//      fires (signature). After it resolves, normal rotation
//      resumes with bulletSpeedMul=1.3.
//
//  Phase 2 and Phase 3 attack patterns are deferred to next pass
//  â for those phases the boss falls back to a simple sweep so
//  cutscenes still trigger on HP thresholds.
// =============================================================

const ENEMY_BULLET_COLOR = '#3aff3a'; // green per spec â visual clarity
const ACID_BULLET_COLOR  = '#aaff44'; // brighter green for the signature

// ---------- Bullet spawn helpers ----------
function spawnBullet(x, y, vx, vy, opts) {
  const o = opts || {};
  const b = {
    x, y, vx, vy,
    r: o.r != null ? o.r : ENEMY_BULLET_R,
    color: o.color || ENEMY_BULLET_COLOR,
  };
  // Optional lifespan in seconds â bullet despawns when it elapses.
  // Used by trail attacks (FUME_TRAIL, CHAIN_REACTION) so static
  // bullets don't accumulate indefinitely.
  if (o.life != null) b.life = o.life;
  if (o.harmless) b.harmless = true;
  enemyBullets.push(b);
}

function spawnAimed(x, y, tx, ty, speed, opts) {
  const dx = tx - x, dy = ty - y;
  const len = Math.hypot(dx, dy) || 1;
  spawnBullet(x, y, (dx / len) * speed, (dy / len) * speed, opts);
}

function spawnRadial(x, y, count, speed, startAngle, opts) {
  const a0 = startAngle || 0;
  for (let i = 0; i < count; i++) {
    const a = a0 + (i / count) * Math.PI * 2;
    spawnBullet(x, y, Math.cos(a) * speed, Math.sin(a) * speed, opts);
  }
}

// ---------- Boss AI state ----------
const bossAI = {
  attack: null,        // active attack id, or null during downtime
  attackT: 0,          // seconds within the current attack
  downtime: 1.5,       // seconds of downtime remaining
  history: [],         // last few attack ids (for "no immediate repeat")
  counter: 0,          // attacks performed this phase
  firstAttack: true,
  // Acid Rain handshake â three steps:
  //   1. preAcidRainPlayed: pre-attack cutscene has fired
  //   2. acidRainFired:     the Acid Rain attack itself ran
  //   3. postAcidRainPlayed: post-attack cutscene has fired
  // Phase 1 â 2 transition only fires after step 3.
  preAcidRainPlayed: false,
  acidRainFired: false,
  postAcidRainPending: false,
  postAcidRainPlayed: false,
  bulletSpeedMul: 1.0, // bumps to 1.3 after Acid Rain resolves
  state: {},           // attack-specific scratch state
};

function resetBossAI() {
  bossAI.attack = null;
  bossAI.attackT = 0;
  bossAI.downtime = 1.5;
  bossAI.history = [];
  bossAI.counter = 0;
  bossAI.firstAttack = true;
  bossAI.preAcidRainPlayed = false;
  bossAI.acidRainFired = false;
  bossAI.postAcidRainPending = false;
  bossAI.postAcidRainPlayed = false;
  bossAI.bulletSpeedMul = 1.0;
  bossAI.state = {};
  // ---- Phase 2 cycling state ----
  bossAI.soul = 'red';
  bossAI.attacksInSoul = 0;
  bossAI.targetAttacksInSoul = 2;
  bossAI.firstRotation = true;
  bossAI.firstRotationIdx = 0;          // index into ['red','blue','purple','green']
  bossAI.soulSwitchT = 0;               // >0 while telegraphing a switch
  bossAI.soulSwitchTo = null;
  bossAI.soulNamedShown = {};           // teach the color name once each
  // ---- Phase 2 â gauntlet ----
  bossAI.gauntletTriggered = false;
  bossAI.gauntletDone = false;
  bossAI.gauntletStep = 0;
  bossAI.gauntletPhase = '';            // 'flash' | 'attack' | 'silence'
  bossAI.gauntletT = 0;
  // ---- Per-attack engine hooks (cleared between attacks) ----
  bossAI.purpleWave = null;
  bossAI.gravityMul = 1;
  bossAI.jumpMul = 1;
  bossAI.blueFloorY = 0;
  // ---- Phase 3 ----
  bossAI.phase3 = null;
}

// ---------- Phase 1 attack pool ----------
const PHASE1_POOL = [
  'TOXIC_CLOUD', 'EXHAUST_PIPES', 'SMOG_WALL', 'CHEMICAL_RUNOFF',
  'SLUDGE_DRIP', 'SMOG_SPIRAL', 'PIPELINE_BURST', 'AIMED_BARRAGE',
];

function pickNextAttack() {
  if (bossAI.firstAttack) {
    bossAI.firstAttack = false;
    return 'TOXIC_CLOUD'; // mandated opener
  }
  const last = bossAI.history[bossAI.history.length - 1];
  const candidates = PHASE1_POOL.filter(a => a !== last);
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function clearAttackHooks() {
  bossAI.purpleWave = null;
  bossAI.gravityMul = 1;
  bossAI.jumpMul = 1;
  bossAI.blueFloorY = 0;
}

function startAttack(id) {
  bossAI.attack = id;
  bossAI.attackT = 0;
  bossAI.history.push(id);
  if (bossAI.history.length > 3) bossAI.history.shift();
  bossAI.state = {};
  clearAttackHooks();
  const def = ATTACKS[id];
  if (def && def.init) def.init();
}

function endAttack() {
  const id = bossAI.attack;
  bossAI.attack = null;
  if (id === 'ACID_RAIN') {
    // Per spec: faster bullets thereafter.
    bossAI.bulletSpeedMul = 1.3;
    bossAI.downtime = 0.5; // brief breather after Acid Rain
    // Queue the post-Acid-Rain barks; updateBoss will fire them on
    // the next frame, once any in-flight cutscene work has settled.
    bossAI.postAcidRainPending = true;
    return;
  }
  bossAI.counter++;
  // Cycling rules from phase1_attacks.md.
  if (bossAI.counter % 5 === 0)      bossAI.downtime = 0;
  else if (bossAI.counter % 3 === 0) bossAI.downtime = 0.5;
  else                                bossAI.downtime = 1.2;
}

// Sweep boss LâR inside BOSS_ZONE â used during downtime and by
// attacks that don't lock the boss.
function bossSweep(dt, speedMul) {
  const m = speedMul || 1.0;
  boss.x += boss.vx * dt * m;
  const left  = BOSS_ZONE.x + BOSS_W / 2;
  const right = BOSS_ZONE.x + BOSS_ZONE.w - BOSS_W / 2;
  if (boss.x < left)  { boss.x = left;  boss.vx =  Math.abs(boss.vx); }
  if (boss.x > right) { boss.x = right; boss.vx = -Math.abs(boss.vx); }
}

function updateBossAI(dt) {
  // The Acid Rain interrupt is no longer triggered here â updateBoss
  // now handles the pre-cutscene â attack â post-cutscene â Phase 2
  // handshake itself so the dialogue plays at the right moments.

  if (!bossAI.attack) {
    // Downtime: boss sweeps, waits to pick the next attack.
    bossSweep(dt);
    bossAI.downtime -= dt;
    if (bossAI.downtime <= 0) {
      const next = pickNextAttack();
      startAttack(next);
    }
    return;
  }

  bossAI.attackT += dt;
  const def = ATTACKS[bossAI.attack];
  if (def && def.update) def.update(dt);

  if (bossAI.attackT >= def.duration) endAttack();
}

// ---------- Phase 1 attacks ----------
const ATTACKS = {

  // 3 radial bursts with reposition between each.
  TOXIC_CLOUD: {
    name: 'TOXIC CLOUD BURST',
    duration: 6.0,
    init() {
      bossAI.state.burstIndex = 0;
      bossAI.state.burstT = 0;
      bossAI.state.fired = false;
      bossAI.state.targetX = boss.x;
    },
    update(dt) {
      const s = bossAI.state;
      s.burstT += dt;

      // Reposition between bursts (after the burst fires).
      if (s.fired) {
        const dx = s.targetX - boss.x;
        boss.x += dx * Math.min(1, dt * 4);
      }

      // 1.0s pulse â fire â 1.0s reposition (per burst)
      if (!s.fired && s.burstT >= 1.0) {
        spawnRadial(boss.x, boss.y, 24, 130 * bossAI.bulletSpeedMul);
        s.fired = true;
      }
      if (s.burstT >= 2.0 && s.burstIndex < 2) {
        s.burstIndex++;
        s.burstT = 0;
        s.fired = false;
        s.targetX = BOSS_ZONE.x + BOSS_W / 2
                  + Math.random() * (BOSS_ZONE.w - BOSS_W);
      }
    },
    draw() {
      const s = bossAI.state;
      if (s && !s.fired && s.burstT < 1.0) {
        const r = 26 + Math.sin(s.burstT * 18) * 6;
        ctx.save();
        ctx.strokeStyle = 'rgba(180, 60, 220, 0.85)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(180, 60, 220, 0.18)';
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    },
  },

  // 4 fixed nozzles fire down with a tight sweep â each nozzle
  // stays close enough to its own column that adjacent streams
  // don't fully cross. No additional aimed shots from the boss.
  EXHAUST_PIPES: {
    name: 'EXHAUST PIPES',
    duration: 8.0,
    init() {
      const n = 4;
      bossAI.state.nozzleX = [];
      for (let i = 0; i < n; i++) {
        bossAI.state.nozzleX.push(ARENA.x + ARENA.w * (i + 1) / (n + 1));
      }
      bossAI.state.streamT = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 1.1);
      s.streamT += dt;
      if (s.streamT >= 0.30) {
        s.streamT = 0;
        const speed = 130 * bossAI.bulletSpeedMul;
        for (let i = 0; i < s.nozzleX.length; i++) {
          // Each nozzle's sweep is tight â narrow enough that adjacent
          // pipes don't merge into a wall.
          const sweep = Math.sin(bossAI.attackT * 1.4 + i * 0.9) * 0.18;
          const a = Math.PI / 2 + sweep; // base = straight down
          spawnBullet(s.nozzleX[i], ARENA.y - 6,
                      Math.cos(a) * speed, Math.sin(a) * speed);
        }
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s || !s.nozzleX) return;
      ctx.save();
      for (const nx of s.nozzleX) {
        ctx.fillStyle = '#5a5a5a';
        ctx.fillRect(nx - 5, ARENA.y - 8, 10, 6);
        ctx.fillStyle = '#222';
        ctx.fillRect(nx - 3, ARENA.y - 4, 6, 4);
      }
      ctx.restore();
    },
  },

  // 3 horizontal walls drift down with single shifting gap;
  // filler bullets fall between them.
  SMOG_WALL: {
    name: 'SMOG WALL',
    duration: 9.0,
    init() {
      bossAI.state.wallIndex = 0;
      bossAI.state.wallT = 2.5; // spawn first wall right away
      bossAI.state.fillerT = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.7);
      s.wallT += dt;
      s.fillerT += dt;
      if (s.wallIndex < 3 && s.wallT >= 2.5) {
        s.wallT = 0;
        s.wallIndex++;
        // One new wall â full row with a single gap of ~50px.
        const gapX = ARENA.x + 35 + Math.random() * (ARENA.w - 70);
        const gapW = 56;
        const speed = 80 * bossAI.bulletSpeedMul;
        for (let x = ARENA.x + 6; x < ARENA.x + ARENA.w - 6; x += 14) {
          if (x > gapX - gapW / 2 && x < gapX + gapW / 2) continue;
          spawnBullet(x, ARENA.y - 8, 0, speed);
        }
      }
      if (s.fillerT >= 0.45) {
        s.fillerT = 0;
        const fx = ARENA.x + 10 + Math.random() * (ARENA.w - 20);
        spawnBullet(fx, ARENA.y - 6, 0, 70 * bossAI.bulletSpeedMul);
      }
    },
  },

  // L and R streams travel inward; irregular spacing; 3 wave pairs
  // at shifting heights.
  CHEMICAL_RUNOFF: {
    name: 'CHEMICAL RUNOFF',
    duration: 7.0,
    init() {
      bossAI.state.waveIndex = 0;
      bossAI.state.waveT = 0;
      bossAI.state.spawnT = 0;
      bossAI.state.leftY = ARENA.y + 60 + Math.random() * (ARENA.h - 120);
      bossAI.state.rightY = ARENA.y + 60 + Math.random() * (ARENA.h - 120);
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.8);
      s.waveT += dt;
      s.spawnT += dt;

      if (s.spawnT >= 0.13 && s.waveT < 1.6) {
        s.spawnT = 0;
        const speed = 150 * bossAI.bulletSpeedMul;
        // Irregular: occasionally skip to leave gaps.
        if (Math.random() > 0.18) {
          spawnBullet(ARENA.x - 6, s.leftY, speed, 0);
        }
        if (Math.random() > 0.18) {
          spawnBullet(ARENA.x + ARENA.w + 6, s.rightY, -speed, 0);
        }
      }
      if (s.waveT >= 2.2) {
        s.waveIndex++;
        if (s.waveIndex < 3) {
          s.waveT = 0;
          s.leftY = ARENA.y + 30 + Math.random() * (ARENA.h - 60);
          s.rightY = ARENA.y + 30 + Math.random() * (ARENA.h - 60);
        }
      }
    },
  },

  // Fast columns with brief shadow telegraph; sweeps + random bursts.
  SLUDGE_DRIP: {
    name: 'SLUDGE DRIP',
    duration: 9.0,
    init() {
      bossAI.state.cols = [];
      const N = 9;
      for (let i = 0; i < N; i++) {
        bossAI.state.cols.push(ARENA.x + ARENA.w * (i + 0.5) / N);
      }
      bossAI.state.queue = []; // {colIdx, fireAt}
      bossAI.state.shadows = []; // {x, life}
      bossAI.state.programT = 0;
      bossAI.state.programIdx = 0;
      // Pre-program: LâR sweep, RâL sweep, two bursts of random doubles.
      const program = [];
      const sweepStep = 0.18;
      let t = 0.4;
      for (let i = 0; i < N; i++) { program.push({ col: i, at: t }); t += sweepStep; }
      t += 0.4;
      for (let i = N - 1; i >= 0; i--) { program.push({ col: i, at: t }); t += sweepStep; }
      t += 0.4;
      for (let b = 0; b < 4; b++) {
        const a = Math.floor(Math.random() * N);
        let bb = Math.floor(Math.random() * N);
        if (bb === a) bb = (a + 1) % N;
        program.push({ col: a, at: t });
        program.push({ col: bb, at: t });
        t += 0.5;
      }
      bossAI.state.queue = program;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.4);
      s.programT += dt;

      // Spawn shadow telegraphs 0.3s ahead, then bullets at the time.
      while (s.programIdx < s.queue.length && s.queue[s.programIdx].at - 0.3 <= s.programT) {
        const ev = s.queue[s.programIdx];
        if (!ev.shadowed) {
          s.shadows.push({ x: s.cols[ev.col], life: 0.3 + (ev.at - s.programT) });
          ev.shadowed = true;
        }
        if (ev.at <= s.programT) {
          const speed = 220 * bossAI.bulletSpeedMul;
          spawnBullet(s.cols[ev.col], ARENA.y - 6, 0, speed);
          s.programIdx++;
        } else {
          break;
        }
      }
      // Tick down shadows
      for (let i = s.shadows.length - 1; i >= 0; i--) {
        s.shadows[i].life -= dt;
        if (s.shadows[i].life <= 0) s.shadows.splice(i, 1);
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s || !s.shadows) return;
      ctx.save();
      ctx.strokeStyle = 'rgba(180, 240, 180, 0.4)';
      ctx.lineWidth = 2;
      for (const sh of s.shadows) {
        ctx.beginPath();
        ctx.moveTo(sh.x, ARENA.y);
        ctx.lineTo(sh.x, ARENA.y + ARENA.h);
        ctx.stroke();
      }
      ctx.restore();
    },
  },

  // Two arms rotating outward from boss centered at top.
  SMOG_SPIRAL: {
    name: 'SMOG SPIRAL',
    duration: 7.5,
    init() {
      bossAI.state.angle = 0;
      bossAI.state.spawnT = 0;
      // Center the boss horizontally for the spiral.
      bossAI.state.targetX = (BOSS_ZONE.x + BOSS_ZONE.x + BOSS_ZONE.w) / 2;
    },
    update(dt) {
      const s = bossAI.state;
      // Glide to center.
      const dx = s.targetX - boss.x;
      boss.x += dx * Math.min(1, dt * 3);

      s.angle += dt * 2.4; // ~2 rotations across the duration
      s.spawnT += dt;
      if (s.spawnT >= 0.085) {
        s.spawnT = 0;
        const speed = 110 * bossAI.bulletSpeedMul;
        // Two arms 180Â° apart.
        for (let arm = 0; arm < 2; arm++) {
          const a = s.angle + arm * Math.PI;
          spawnBullet(boss.x, boss.y,
                      Math.cos(a) * speed, Math.sin(a) * speed);
        }
      }
    },
  },

  // 3 cluster drops, scatter at 1s; 2 rounds.
  PIPELINE_BURST: {
    name: 'PIPELINE BURST',
    duration: 6.5,
    init() {
      bossAI.state.round = 0;
      bossAI.state.roundT = 0;
      bossAI.state.clusters = []; // {x, y, vy, t, scattered}
      bossAI.state.spawnedRound = -1;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.7);
      s.roundT += dt;

      // Spawn a new round of 3 clusters at the start of each round.
      if (s.spawnedRound < s.round) {
        for (let i = 0; i < 3; i++) {
          s.clusters.push({
            x: ARENA.x + 30 + Math.random() * (ARENA.w - 60),
            y: ARENA.y - 12,
            vy: 90 * bossAI.bulletSpeedMul,
            t: 0,
            scattered: false,
          });
        }
        s.spawnedRound = s.round;
      }

      // Update clusters
      for (let i = s.clusters.length - 1; i >= 0; i--) {
        const c = s.clusters[i];
        c.t += dt;
        c.y += c.vy * dt;
        if (!c.scattered && c.t >= 1.0) {
          c.scattered = true;
          // Scatter into a downward-biased cone of 10 bullets.
          const N = 10;
          for (let k = 0; k < N; k++) {
            const a = Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.9;
            const sp = (130 + Math.random() * 80) * bossAI.bulletSpeedMul;
            spawnBullet(c.x, c.y, Math.cos(a) * sp, Math.sin(a) * sp);
          }
          s.clusters.splice(i, 1);
        }
      }

      if (s.round < 1 && s.roundT >= 3.0) {
        s.round++;
        s.roundT = 0;
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s || !s.clusters) return;
      ctx.save();
      for (const c of s.clusters) {
        // Tight clump indicator
        ctx.fillStyle = 'rgba(60, 220, 60, 0.85)';
        ctx.beginPath();
        ctx.arc(c.x, c.y, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(120, 255, 120, 0.35)';
        ctx.beginPath();
        ctx.arc(c.x, c.y, 11, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    },
  },

  // Rapid-fires at the player's current position; boss keeps moving.
  AIMED_BARRAGE: {
    name: 'AIMED BARRAGE',
    duration: 5.0,
    init() {
      bossAI.state.fireT = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.9);
      s.fireT += dt;
      if (s.fireT >= 0.2) {
        s.fireT = 0;
        spawnAimed(boss.x, boss.y, player.x, player.y,
                   220 * bossAI.bulletSpeedMul, { color: '#aaff77' });
      }
    },
  },

  // Signature â 9 expanding rings of escalating density, with a
  // sustained inward drizzle layered between rings. No stun window.
  ACID_RAIN: {
    name: 'ACID RAIN',
    duration: 13.0,
    init() {
      bossAI.state.phase = 'telegraph';
      bossAI.state.t = 0;
      bossAI.state.ringIndex = 0;
      bossAI.state.drizzleT = 0;
      // Park boss at center for the signature.
      bossAI.state.targetX = (BOSS_ZONE.x + BOSS_ZONE.x + BOSS_ZONE.w) / 2;
    },
    update(dt) {
      const s = bossAI.state;
      // Drift to center during telegraph.
      if (s.phase === 'telegraph') {
        const dx = s.targetX - boss.x;
        boss.x += dx * Math.min(1, dt * 5);
      }
      s.t += dt;

      if (s.phase === 'telegraph') {
        if (s.t >= 1.0) {
          s.phase = 'rings';
          s.t = 1.1;        // fire first ring immediately
          s.ringIndex = 0;
        }
      } else if (s.phase === 'rings') {
        // Escalating ring density. Counts are capped so the linear
        // gap between bullets stays player-passable by the time the
        // ring reaches the arena edge â late rings used to pack 50+
        // bullets and there was no room to thread.
        const counts = [22, 24, 26, 28, 30, 32, 34, 36, 38];
        const interval = 1.05;          // seconds between rings
        if (s.ringIndex < counts.length && s.t >= interval) {
          s.t = 0;
          spawnRadial(boss.x, boss.y, counts[s.ringIndex],
                      150, s.ringIndex * 0.11,
                      { color: ACID_BULLET_COLOR });
          s.ringIndex++;
        }
        // Sustained acid drizzle from the ceiling â bullets fall
        // straight down through the ring gaps, punishing players
        // who park between rings.
        s.drizzleT += dt;
        if (s.drizzleT >= 0.18) {
          s.drizzleT = 0;
          const dx = ARENA.x + 16 + Math.random() * (ARENA.w - 32);
          spawnBullet(dx, ARENA.y - 6, 0, 220,
                      { color: ACID_BULLET_COLOR });
        }
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s) return;
      if (s.phase === 'telegraph') {
        const a = 0.25 + 0.15 * Math.sin(s.t * 30);
        ctx.fillStyle = 'rgba(60, 220, 60, ' + a.toFixed(2) + ')';
        ctx.fillRect(ARENA.x, ARENA.y, ARENA.w, ARENA.h);
        // Signature label
        ctx.font = 'bold 18px "Courier New", monospace';
        ctx.fillStyle = '#aaff66';
        ctx.textAlign = 'center';
        ctx.fillText('ACID RAIN', CANVAS_W / 2, ARENA.y - 30);
      }
    },
  },
};

// =============================================================
//  PHASE 2 â soul-driven attack rotation
// =============================================================
//  Phase 2 forces the player into one of four soul colors at any
//  given moment. Each color changes movement physics and has its
//  own pool of 5 attacks plus a signature. Every 2-3 attacks the
//  soul switches; the first full rotation is hard-coded
//  RedâBlueâPurpleâGreen so the player learns each mechanic.
// =============================================================

const SOUL_ORDER = ['red', 'blue', 'purple', 'green'];

const PHASE2_POOLS = {
  red:    ['CONTAMINATION_ZONES', 'TOXIC_BUBBLES', 'PRESSURE_VALVE', 'FUME_TRAIL', 'STATIC_FIELD'],
  blue:   ['ACID_PUDDLES', 'RISING_SMOG', 'DOWNDRAFT', 'GEYSER', 'BOUNCE_PADS'],
  purple: ['LINE_SWEEP', 'RAIL_SHUTDOWN', 'CONVERGING_RAILS', 'ALTERNATING_CURRENT', 'CHAIN_REACTION'],
  green:  ['CARDINAL_SHOTS', 'RING_OF_FIRE', 'PING_PONG', 'FEINT', 'MACHINE_GUN_ROULETTE'],
};

const PHASE2_SIGS = {
  red:    'BIOHAZARD',
  blue:   'GRAVITY_WELL',
  purple: 'TRACK_SWITCH',
  green:  'TOXIC_FORTRESS',
};

const SOUL_TO_STATE = {
  red:    S_RED,
  blue:   S_BLUE,
  purple: S_PURPLE,
  green:  S_GREEN,
};

function startSoulSwitch() {
  let next;
  if (bossAI.firstRotation) {
    bossAI.firstRotationIdx++;
    if (bossAI.firstRotationIdx >= SOUL_ORDER.length) {
      bossAI.firstRotation = false;
      const choices = SOUL_ORDER.filter(s => s !== bossAI.soul);
      next = choices[Math.floor(Math.random() * choices.length)];
    } else {
      next = SOUL_ORDER[bossAI.firstRotationIdx];
    }
  } else {
    const choices = SOUL_ORDER.filter(s => s !== bossAI.soul);
    next = choices[Math.floor(Math.random() * choices.length)];
  }
  bossAI.soulSwitchTo = next;
  bossAI.soulSwitchT = 1.0;
  // Wipe in-flight bullets â switching states mid-fire would be unfair.
  enemyBullets.length = 0;
}

function pickNextPhase2Attack() {
  // First attack of the phase is locked to CONTAMINATION_ZONES per spec.
  if (bossAI.firstAttack) {
    bossAI.firstAttack = false;
    return 'CONTAMINATION_ZONES';
  }
  const pool = PHASE2_POOLS[bossAI.soul];
  const last = bossAI.history[bossAI.history.length - 1];
  const candidates = pool.filter(a => a !== last);
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function endPhase2Attack() {
  const id = bossAI.attack;
  bossAI.attack = null;
  clearAttackHooks();
  bossAI.attacksInSoul++;
  bossAI.counter++;
  // Downtime decreases as HP drops.
  const hpFrac = boss.hp / boss.maxHp;
  if (hpFrac <= 0.25)      bossAI.downtime = 0.0;
  else if (hpFrac <= 0.50) bossAI.downtime = 0.5;
  else                      bossAI.downtime = 1.0;
}

function updatePhase2AI(dt) {
  // Gauntlet trigger â at very low HP, freeze invincible and chain
  // all four signatures back to back.
  if (!bossAI.gauntletDone && !bossAI.gauntletTriggered
      && boss.hp / boss.maxHp <= 0.07) {
    bossAI.gauntletTriggered = true;
    enemyBullets.length = 0;
    bossAI.attack = null;
    boss.invincible = true;
    bossAI.gauntletPhase = 'intro';
    bossAI.gauntletT = 0;
    bossAI.gauntletStep = 0;
    return;
  }
  if (bossAI.gauntletTriggered && !bossAI.gauntletDone) {
    updateGauntlet(dt);
    return;
  }

  // Soul switch telegraph (1s freeze, no attack, screen flash).
  if (bossAI.soulSwitchT > 0) {
    bossAI.soulSwitchT -= dt;
    bossSweep(dt, 0.5);
    if (bossAI.soulSwitchT <= 0) {
      bossAI.soul = bossAI.soulSwitchTo;
      bossAI.soulSwitchTo = null;
      setState(SOUL_TO_STATE[bossAI.soul]);
      bossAI.attacksInSoul = 0;
      bossAI.targetAttacksInSoul = 2 + Math.floor(Math.random() * 2); // 2 or 3
      bossAI.soulNamedShown[bossAI.soul] = true;
      startAttack(pickNextPhase2Attack());
    }
    return;
  }

  if (!bossAI.attack) {
    bossSweep(dt);
    bossAI.downtime -= dt;
    if (bossAI.downtime <= 0) {
      // Time to switch souls? Use signature as the closer of a soul-cycle
      // every 4th time we run out of budget on a given color.
      if (bossAI.attacksInSoul >= bossAI.targetAttacksInSoul) {
        startSoulSwitch();
      } else {
        startAttack(pickNextPhase2Attack());
      }
    }
    return;
  }

  bossAI.attackT += dt;
  const def = ATTACKS[bossAI.attack];
  if (def && def.update) def.update(dt);
  if (bossAI.attackT >= def.duration) endPhase2Attack();
}

// ---------- Gauntlet (Phase 2 â 3 desperation) ----------
const GAUNTLET_SEQUENCE = [
  { soul: 'red',    attack: 'BIOHAZARD' },
  { soul: 'blue',   attack: 'GRAVITY_WELL' },
  { soul: 'purple', attack: 'TRACK_SWITCH' },
  { soul: 'green',  attack: 'TOXIC_FORTRESS' },
];

function startGauntletStep(idx) {
  const step = GAUNTLET_SEQUENCE[idx];
  bossAI.soul = step.soul;
  setState(SOUL_TO_STATE[step.soul]);
  enemyBullets.length = 0;
  startAttack(step.attack);
  bossAI.gauntletPhase = 'attack';
  bossAI.gauntletT = 0;
}

function updateGauntlet(dt) {
  bossAI.gauntletT += dt;
  if (bossAI.gauntletPhase === 'intro') {
    // Slot-machine cycle through the colors before settling on Red.
    bossSweep(dt, 0.3);
    if (bossAI.gauntletT >= 1.5) {
      startGauntletStep(0);
    }
    return;
  }
  if (bossAI.gauntletPhase === 'attack') {
    const def = ATTACKS[bossAI.attack];
    if (def && def.update) def.update(dt);
    bossAI.attackT += dt;
    if (bossAI.attackT >= def.duration) {
      bossAI.attack = null;
      clearAttackHooks();
      bossAI.gauntletStep++;
      if (bossAI.gauntletStep >= GAUNTLET_SEQUENCE.length) {
        // All four signatures survived. Brief silence, then the
        // boss stands exposed at 1 HP; the next auto-fire shot
        // ends Phase 2.
        bossAI.gauntletPhase = 'silence';
        bossAI.gauntletT = 0;
        enemyBullets.length = 0;
        boss.invincible = false;
        boss.hp = 1; // health bar shows the single pixel
        // Force player back to RED for a clean transition feel.
        setState(S_RED);
      } else {
        startGauntletStep(bossAI.gauntletStep);
      }
    }
    return;
  }
  if (bossAI.gauntletPhase === 'silence') {
    // Boss stands still and vulnerable. The auto-fire will finish
    // him within ~0.1s. Fallback: if for some reason the shot misses
    // for 2s, mark gauntletDone so the cutscene fires anyway.
    if (bossAI.gauntletT >= 2.0) {
      bossAI.gauntletDone = true;
    }
    return;
  }
}

// =============================================================
//  PHASE 2 ATTACK DEFINITIONS
// =============================================================
//  Per phase2_attacks.md. Bullets generally spawn INSIDE the box,
//  faster than Phase 1, with patterns designed around the active
//  soul color's movement rules.
// =============================================================

// Faster Phase 2 baseline.
const P2_SPEED = 1.15;

// Helper: spawn a bullet that won't damage (for "harmless head" of the
// FUME_TRAIL snake or visual-only telegraphs).
function spawnHarmless(x, y, vx, vy, opts) {
  const o = opts || {};
  enemyBullets.push({
    x, y, vx, vy,
    r: o.r != null ? o.r : ENEMY_BULLET_R,
    color: o.color || 'rgba(255, 255, 255, 0.45)',
    harmless: true,
  });
}

// Random point inside the arena (with margin).
function arenaRand(margin) {
  const m = margin || 30;
  return {
    x: ARENA.x + m + Math.random() * (ARENA.w - 2 * m),
    y: ARENA.y + m + Math.random() * (ARENA.h - 2 * m),
  };
}

// ---------- Add Phase 2 attacks to the existing ATTACKS table ----------
Object.assign(ATTACKS, {

  // ============================================================
  //  RED SOUL â 5 attacks + signature
  // ============================================================

  // 3-4 zones pulse, then erupt radially. 3 rounds.
  CONTAMINATION_ZONES: {
    name: 'CONTAMINATION ZONES',
    duration: 7.0,
    init() {
      bossAI.state.round = -1;
      bossAI.state.roundT = 0;
      bossAI.state.zones = [];
      bossAI.state.fired = false;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.5);
      s.roundT += dt;
      if (s.round < 0 || (s.fired && s.roundT >= 0.6)) {
        // Begin a new round.
        s.round = (s.round < 0) ? 0 : s.round + 1;
        if (s.round >= 3) return;
        s.fired = false;
        s.roundT = 0;
        s.zones = [];
        const n = 3 + Math.floor(Math.random() * 2);
        for (let i = 0; i < n; i++) s.zones.push(arenaRand(40));
      }
      if (!s.fired && s.roundT >= 1.5) {
        s.fired = true;
        for (const z of s.zones) {
          // 10 bullets at moderate speed gives clear sight-lines
          // between rays â was 14 at 130 which packed every angle.
          spawnRadial(z.x, z.y, 10, 90 * P2_SPEED);
        }
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s || !s.zones) return;
      ctx.save();
      for (const z of s.zones) {
        if (s.fired) continue;
        const r = 14 + Math.sin(s.roundT * 16) * 5;
        ctx.strokeStyle = 'rgba(255, 80, 80, 0.85)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(z.x, z.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255, 80, 80, 0.18)';
        ctx.beginPath();
        ctx.arc(z.x, z.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    },
  },

  // 6 large slow drifting bubbles bounce around; pop into 8 bullets.
  TOXIC_BUBBLES: {
    name: 'TOXIC BUBBLES',
    duration: 8.5,
    init() {
      bossAI.state.round = 0;
      bossAI.state.roundT = 0;
      bossAI.state.bubbles = [];
      bossAI.state.popped = false;
      _spawnBubbles();
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.4);
      s.roundT += dt;
      // Drift + bounce
      for (const bub of s.bubbles) {
        bub.x += bub.vx * dt;
        bub.y += bub.vy * dt;
        if (bub.x < ARENA.x + bub.r) { bub.x = ARENA.x + bub.r; bub.vx *= -1; }
        if (bub.x > ARENA.x + ARENA.w - bub.r) { bub.x = ARENA.x + ARENA.w - bub.r; bub.vx *= -1; }
        if (bub.y < ARENA.y + bub.r) { bub.y = ARENA.y + bub.r; bub.vy *= -1; }
        if (bub.y > ARENA.y + ARENA.h - bub.r) { bub.y = ARENA.y + ARENA.h - bub.r; bub.vy *= -1; }
      }
      if (!s.popped && s.roundT >= 4.0) {
        s.popped = true;
        for (const bub of s.bubbles) {
          // Slower scatter (was 170) so the player can actually
          // weave between the rays from adjacent bubbles.
          spawnRadial(bub.x, bub.y, 8, 110 * P2_SPEED);
        }
        s.bubbles = [];
      }
      if (s.popped && s.roundT >= 4.5 && s.round < 1) {
        s.round++;
        s.roundT = 0;
        s.popped = false;
        _spawnBubbles();
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s || !s.bubbles) return;
      ctx.save();
      for (const bub of s.bubbles) {
        ctx.fillStyle = 'rgba(180, 60, 200, 0.35)';
        ctx.beginPath();
        ctx.arc(bub.x, bub.y, bub.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(220, 120, 240, 0.9)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(bub.x, bub.y, bub.r, 0, Math.PI * 2);
        ctx.stroke();
      }

    },
  },

  // Center sprinkler + occasional edge punctuation. The sprinkler

  // single-side to keep the orbit puzzle readable. A short
  // telegraph fires before the sprinkler turns on so the player

    },

      bossSweep(dt, 0.4);
      s.t += dt;

      s.spawnT += dt;
      s.edgeT += dt;

      }
      // Edge punctuation â only ONE bullet per cycle from a random
      // side, on a slow cadence. Was 4 bullets every 0.45s, which
      // overwhelmed the sprinkler dodge.
      if (s.edgeT >= 1.2) {
        s.edgeT = 0;
        const sp = 50 * P2_SPEED;
        const side = Math.floor(Math.random() * 4);
        if (side === 0) {
          spawnBullet(ARENA.x + Math.random() * ARENA.w, ARENA.y + 4, 0, sp);

        } else if (side === 2) {

        } else {
          spawnBullet(ARENA.x + ARENA.w - 4,
                      ARENA.y + Math.random() * ARENA.h, -sp, 0);
        }

    },
    draw() {

      ctx.save();

  // 1 then 2 then 3 snake heads leaving stationary trails.
  FUME_TRAIL: {
    name: 'FUME TRAIL',
    duration: 8.0,
    init() {
      bossAI.state.snakes = [_makeSnake()];
      bossAI.state.spawnExtra1 = false;
      bossAI.state.spawnExtra2 = false;
      bossAI.state.dropT = 0;
    },
    update(dt) {

      bossSweep(dt, 0.3);
      if (!s.spawnExtra1 && bossAI.attackT >= 2.0) { s.snakes.push(_makeSnake()); s.spawnExtra1 = true; }
      if (!s.spawnExtra2 && bossAI.attackT >= 4.0) { s.snakes.push(_makeSnake()); s.spawnExtra2 = true; }
      // Move heads in smooth curves.
      for (const sk of s.snakes) {
        sk.angle += (Math.random() - 0.5) * dt * 4;

        sk.y += Math.sin(sk.angle) * sk.speed * dt;

        if (sk.y < ARENA.y + 10) { sk.y = ARENA.y + 10; sk.angle = -sk.angle; }
        if (sk.y > ARENA.y + ARENA.h - 10) { sk.y = ARENA.y + ARENA.h - 10; sk.angle = -sk.angle; }
        sk.dropT += dt;
        if (sk.dropT >= 0.3) {
          sk.dropT = 0;

        ctx.arc(sk.x, sk.y, 9, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    },
  },

  // Grid of bullets with one drifting safe gap.
  STATIC_FIELD: {
    name: 'STATIC FIELD',
    duration: 10.5,
    init() {
      // Telegraph the safe gap on top of the player's current
      // position for ~1.2s before the grid materialises, so the
      // player has a clear "stand still here" target to hold.
      bossAI.state.phase = 'telegraph';
      bossAI.state.t = 0;
      bossAI.state.dirIdx = 0;
      bossAI.state.dirChanges = 0;
      bossAI.state.dir = { x: 1, y: 0 };
      bossAI.state.gapX = player.x;
      bossAI.state.gapY = player.y;
      bossAI.state.gridBullets = [];
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.3);
      s.t += dt;

      if (s.phase === 'telegraph') {
        // Re-anchor the gap to the player while the warning runs so
        // the safe pocket lands exactly where they were standing
        // when the grid drops.
        s.gapX = player.x;
        s.gapY = player.y;
        if (s.t >= 1.2) {
          s.phase = 'active';
          s.t = 0;
          _populateGrid();
        }
        return;
      }

      // Drift bullets in current direction (slower than the original
      // 45px/s so the player has a beat to read each shift).
      const sp = 28 * P2_SPEED;
      for (const b of s.gridBullets) {
        b.x += s.dir.x * sp * dt;
        b.y += s.dir.y * sp * dt;
        // Wrap to opposite side.
        if (b.x < ARENA.x - 4)        b.x = ARENA.x + ARENA.w;
        if (b.x > ARENA.x + ARENA.w + 4) b.x = ARENA.x;
        if (b.y < ARENA.y - 4)        b.y = ARENA.y + ARENA.h;
        if (b.y > ARENA.y + ARENA.h + 4) b.y = ARENA.y;
      }
      // Move gap.
      s.gapX += s.dir.x * sp * dt;
      s.gapY += s.dir.y * sp * dt;
      if (s.t >= 3.0 && s.dirChanges < 3) {
        s.t = 0;
        s.dirChanges++;
        const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
        s.dir = dirs[Math.floor(Math.random() * 4)];
      }
      _staticFieldCollide(s);
    },
    draw() {
      const s = bossAI.state;
      if (!s) return;
      ctx.save();

      if (s.phase === 'telegraph') {
        // Pulsing warning ring on the player's position. No grid
        // yet â the player just sees where the safe pocket will
        // open and can stand still inside it.
        const pulse = 0.45 + 0.35 * Math.sin(s.t * 16);
        ctx.fillStyle = 'rgba(80, 220, 120, ' + (pulse * 0.55).toFixed(2) + ')';
        ctx.beginPath();
        ctx.arc(s.gapX, s.gapY, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(140, 255, 160, ' + pulse.toFixed(2) + ')';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(s.gapX, s.gapY, 30, 0, Math.PI * 2);
        ctx.stroke();
        ctx.font = 'bold 13px "Courier New", monospace';
        ctx.fillStyle = '#aaffaa';
        ctx.textAlign = 'center';
        ctx.fillText('STATIC FIELD', CANVAS_W / 2, ARENA.y - 18);
        ctx.restore();
        return;
      }

      for (const b of s.gridBullets) {
        // Skip bullets inside the gap.
        const dx = b.x - s.gapX, dy = b.y - s.gapY;
        if (dx*dx + dy*dy < 30*30) continue;
        ctx.fillStyle = '#c845ff';
        ctx.beginPath();
        ctx.arc(b.x, b.y, ENEMY_BULLET_R, 0, Math.PI * 2);
        ctx.fill();
      }
      // Gap outline (faint).
      ctx.strokeStyle = 'rgba(180, 255, 180, 0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s.gapX, s.gapY, 30, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    },
  },

  // SIGNATURE â Triple spiral with reversals.
  BIOHAZARD: {
    name: 'BIOHAZARD',
    duration: 6.0,
    init() {
      bossAI.state.phase = 'telegraph';
      bossAI.state.t = 0;
      bossAI.state.angle = 0;
      bossAI.state.dir = 1;
      bossAI.state.reversals = 0;

          s.dir *= -1;

    draw() {

      if (s.phase === 'telegraph') {
        ctx.save();
        const a = 0.3 + 0.2 * Math.sin(s.t * 24);
        ctx.fillStyle = 'rgba(255, 60, 60, ' + a.toFixed(2) + ')';
        ctx.fillRect(ARENA.x, ARENA.y, ARENA.w, ARENA.h);
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.fillStyle = '#ff5050';
        ctx.textAlign = 'center';
        ctx.fillText('â£ BIOHAZARD â£', CANVAS_W / 2, ARENA.y - 30);

  },

  // ============================================================
  //  BLUE SOUL â gravity-locked
  // ============================================================

  // Sliding green puddles on the floor + ceiling drops. Puddles are
  // sized so the player has real safe floor between them â total
  // covered floor is ~40%, leaving ~60% open.
  ACID_PUDDLES: {
    name: 'ACID PUDDLES',
    duration: 8.5,
    init() {
      bossAI.state.phase = 'telegraph';
      bossAI.state.t = 0;
      bossAI.state.puddles = [];
      const w = ARENA.w / 7;
      for (let i = 0; i < 3; i++) {
        bossAI.state.puddles.push({
          x: ARENA.x + (i + 0.5) * (ARENA.w / 3),
          w: w,
          vx: (Math.random() < 0.5 ? -1 : 1) * 35,
        });
      }
      bossAI.state.dropT = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.3);
      s.t += dt;
      // 1.0s grace telegraph â puddle outlines flash on the floor
      // but don't deal damage yet, so the player can step away from
      // their footprint before the acid lands.
      if (s.phase === 'telegraph') {
        if (s.t >= 1.0) { s.phase = 'active'; s.t = 0; }
        return;
      }
      // Slide puddles.
      for (const p of s.puddles) {
        p.x += p.vx * dt;
        if (p.x < ARENA.x + p.w / 2)         { p.x = ARENA.x + p.w / 2; p.vx *= -1; }
        if (p.x > ARENA.x + ARENA.w - p.w/2) { p.x = ARENA.x + ARENA.w - p.w / 2; p.vx *= -1; }
      }
      // Spawn ceiling drops.
      s.dropT += dt;
      if (s.dropT >= 0.55) {
        s.dropT = 0;
        const dx = ARENA.x + 12 + Math.random() * (ARENA.w - 24);
        spawnBullet(dx, ARENA.y - 6, 0, 230 * P2_SPEED);
      }
      // Puddle collisions: damage if player feet are inside.
      _puddleDamage(s.puddles);
    },
    draw() {
      const s = bossAI.state;
      if (!s || !s.puddles) return;
      ctx.save();
      const py = ARENA.y + ARENA.h - 6;
      if (s.phase === 'telegraph') {
        const a = 0.25 + 0.35 * Math.sin(s.t * 18);
        for (const p of s.puddles) {
          ctx.strokeStyle = 'rgba(160, 255, 80, ' + a.toFixed(2) + ')';
          ctx.lineWidth = 2;
          ctx.strokeRect(p.x - p.w / 2 + 0.5, py + 0.5, p.w, 6);
          ctx.fillStyle = 'rgba(160, 255, 80, ' + (a * 0.35).toFixed(2) + ')';
          ctx.fillRect(p.x - p.w / 2, py, p.w, 6);
        }
      } else {
        for (const p of s.puddles) {
          ctx.fillStyle = 'rgba(140, 255, 80, 0.7)';
          ctx.fillRect(p.x - p.w / 2, py, p.w, 6);
          ctx.fillStyle = 'rgba(80, 255, 60, 0.4)';
          ctx.fillRect(p.x - p.w / 2, py - 3, p.w, 3);

      ctx.restore();
    },

  // Bands rising from the floor with a single gap each. Each band
  // is pre-rolled and telegraphed for ~0.6s on the floor before its
  // bullets actually spawn â without this the bullets spawn at the
  // player's feet (floor level) and one-shot a grounded player.
  RISING_SMOG: {
    name: 'RISING SMOG',
    duration: 11.0,
    init() {
      bossAI.state.bandIndex = 0;
      bossAI.state.spawnT = 1.6;
      bossAI.state.pending = null;       // {gapX, gapW, speed, t}
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.3);

      if (s.pending) {
        s.pending.t += dt;
        if (s.pending.t >= 0.6) {
          const { gapX, gapW, speed } = s.pending;
          for (let x = ARENA.x + 6; x < ARENA.x + ARENA.w - 6; x += 14) {
            if (x > gapX - gapW / 2 && x < gapX + gapW / 2) continue;
            spawnBullet(x, ARENA.y + ARENA.h - 6, 0, speed);
          }
          s.bandIndex++;
          s.pending = null;
          s.spawnT = 0;
        }
        return;
      }

      if (s.bandIndex >= 5) return;
      s.spawnT += dt;
      const interval = 1.4 - s.bandIndex * 0.1;
      if (s.spawnT >= interval) {
        const gapX = ARENA.x + 28 + Math.random() * (ARENA.w - 56);
        const gapW = 50;
        const speed = -(60 + s.bandIndex * 18) * P2_SPEED;
        s.pending = { gapX, gapW, speed, t: 0 };
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s || !s.pending) return;
      ctx.save();
      const pb = s.pending;
      const pulse = 0.4 + 0.4 * Math.sin(pb.t * 22);
      // Floor warning strip â solid where bullets will spawn, gap
      // outlined where the safe pocket is.
      ctx.fillStyle = 'rgba(120, 200, 255, ' + (pulse * 0.6).toFixed(2) + ')';
      for (let x = ARENA.x + 6; x < ARENA.x + ARENA.w - 6; x += 14) {
        if (x > pb.gapX - pb.gapW / 2 && x < pb.gapX + pb.gapW / 2) continue;
        ctx.fillRect(x - 4, ARENA.y + ARENA.h - 8, 8, 6);
      }
      ctx.strokeStyle = 'rgba(140, 255, 160, ' + pulse.toFixed(2) + ')';
      ctx.lineWidth = 2;
      ctx.strokeRect(pb.gapX - pb.gapW / 2 + 0.5,
                     ARENA.y + ARENA.h - 14 + 0.5,
                     pb.gapW, 12);
      ctx.restore();
    },
  },

  // Columns sweeping LâR then RâL.
  DOWNDRAFT: {
    name: 'DOWNDRAFT',
    duration: 7.5,
    init() {
      bossAI.state.cols = [];
      const N = 9;
      for (let i = 0; i < N; i++) {
        bossAI.state.cols.push(ARENA.x + ARENA.w * (i + 0.5) / N);
      }
      bossAI.state.idx = 0;
      bossAI.state.dir = 1;
      bossAI.state.cycle = 0;
      bossAI.state.t = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.3);
      s.t += dt;
      if (s.t >= 0.18) {
        s.t = 0;
        const isDouble = (s.cycle % 3 === 2);
        if (isDouble) {
          // Two columns with a gap between them.
          spawnBullet(s.cols[s.idx], ARENA.y - 6, 0, 220 * P2_SPEED);
          const other = (s.idx + 4) % s.cols.length;
          spawnBullet(s.cols[other], ARENA.y - 6, 0, 220 * P2_SPEED);
        } else {
          spawnBullet(s.cols[s.idx], ARENA.y - 6, 0, 220 * P2_SPEED);
        }
        s.idx += s.dir;
        if (s.idx < 0 || s.idx >= s.cols.length) {
          s.dir *= -1;
          s.idx += s.dir;
          s.cycle++;
        }
      }
    },
  },

  // 3 floor warning + erupting columns; horizontal mid-height drift.
  GEYSER: {
    name: 'GEYSER',
    duration: 8.5,
    init() {
      bossAI.state.round = -1;
      bossAI.state.roundT = 0;
      bossAI.state.geysers = []; // {x, phase: 'warn'|'erupt', t}
      bossAI.state.driftT = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.3);
      s.roundT += dt;
      // Begin a new round if needed.
      if (s.geysers.length === 0 && s.round < 3) {
        s.round++;
        s.geysers = [];
        for (let i = 0; i < 3; i++) {
          s.geysers.push({
            x: ARENA.x + 30 + Math.random() * (ARENA.w - 60),
            phase: 'warn',
            t: 0,
          });
        }
      }
      // Update geysers.
      for (let i = s.geysers.length - 1; i >= 0; i--) {
        const g = s.geysers[i];
        g.t += dt;
        if (g.phase === 'warn' && g.t >= 0.5) {
          g.phase = 'erupt';
          g.t = 0;
          // Spawn a column of bullets all at once.
          for (let y = ARENA.y + ARENA.h - 8; y > ARENA.y; y -= 14) {
            spawnBullet(g.x, y, 0, 0, { color: '#aaff44' });
          }
        }
        if (g.phase === 'erupt' && g.t >= 2.0) {
          // Erupt finished â purge column bullets we spawned.
          // (They had vy=0; they linger. Clear by proximity.)
          for (let j = enemyBullets.length - 1; j >= 0; j--) {
            const b = enemyBullets[j];
            if (Math.abs(b.x - g.x) < 6 && b.vx === 0 && b.vy === 0) {
              enemyBullets.splice(j, 1);
            }
          }
          s.geysers.splice(i, 1);
        }
      }
      // Drift bullets â placed just above the floor so a grounded
      // player must actually jump them. The previous y was at 45%
      // of the arena height (above the player's jump apex), so the
      // bullets sailed harmlessly overhead.
      s.driftT += dt;
      if (s.driftT >= 0.55) {
        s.driftT = 0;
        const fromLeft = Math.random() < 0.5;
        const yMid = ARENA.y + ARENA.h - 18 + (Math.random() - 0.5) * 6;
        spawnBullet(
          fromLeft ? ARENA.x - 6 : ARENA.x + ARENA.w + 6,
          yMid,
          (fromLeft ? 1 : -1) * 130 * P2_SPEED,
          0
        );
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s || !s.geysers) return;
      ctx.save();
      for (const g of s.geysers) {
        if (g.phase === 'warn') {
          const a = 0.3 + 0.4 * Math.sin(g.t * 20);
          ctx.fillStyle = 'rgba(180, 255, 80, ' + a.toFixed(2) + ')';
          ctx.fillRect(g.x - 8, ARENA.y + ARENA.h - 4, 16, 4);
          // Up arrow telegraph.
          ctx.strokeStyle = 'rgba(180, 255, 80, 0.85)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(g.x, ARENA.y + ARENA.h - 6);
          ctx.lineTo(g.x, ARENA.y + ARENA.h - 26);
          ctx.moveTo(g.x - 4, ARENA.y + ARENA.h - 22);
          ctx.lineTo(g.x, ARENA.y + ARENA.h - 26);
          ctx.lineTo(g.x + 4, ARENA.y + ARENA.h - 22);
          ctx.stroke();
        }
      }
      ctx.restore();
    },
  },

  // ============================================================
  //  PURPLE SOUL â rail-locked
  // ============================================================

  // A solid vertical bar sweeps across the lanes; alternates side.
  LINE_SWEEP: {
    name: 'LINE SWEEP',
    duration: 11.0,
    init() {
      bossAI.state.phase = 'telegraph';
      bossAI.state.t = 0;
      bossAI.state.sweepIdx = 0;
      bossAI.state.dir = 1;             // first sweep goes L â R
      bossAI.state.barX = ARENA.x;
      bossAI.state.spawnT = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.3);
      s.t += dt;

      // 1.0s telegraph before each sweep â gives the player a beat
      // to position at the opposite edge from where the bar will
      // start, otherwise they can't possibly stay ahead.
      if (s.phase === 'telegraph') {
        if (s.t >= 1.0) {
          s.phase = 'sweeping';
          s.t = 0;
          s.spawnT = 0;
          s.barX = (s.dir === 1) ? ARENA.x : ARENA.x + ARENA.w;
        }
        return;
      }

      // Slightly gentler escalation than before so the player can
      // physically outrun the bar on every sweep â was 140/170/200
      // (last sweep faster than player), now 140/160/180.
      const speed = (140 + s.sweepIdx * 20) * P2_SPEED;
      s.barX += s.dir * speed * dt;

      // Lay down stationary bar bullets at the current x.
      s.spawnT += dt;
      if (s.spawnT >= 0.05) {
        s.spawnT = 0;
        for (let i = 0; i < PURPLE_LINES; i++) {
          spawnBullet(s.barX, purpleLineY(i), 0, 0, { color: '#c845ff' });
        }
      }

      // Bar stops 70px short of the opposite edge â the unswept
      // strip is the player's safe pocket. Without this, the bar
      // covered the entire arena width and the player had nowhere
      // to be when it reached the wall.
      const stopMargin = 70;
      const stopped = (s.dir === 1)
        ? s.barX > ARENA.x + ARENA.w - stopMargin
        : s.barX < ARENA.x + stopMargin;
      if (stopped) {
        for (let j = enemyBullets.length - 1; j >= 0; j--) {
          const b = enemyBullets[j];
          if (b.vx === 0 && b.vy === 0 && b.color === '#c845ff') {
            enemyBullets.splice(j, 1);
          }
        }
        s.sweepIdx++;
        s.dir *= -1;
        if (s.sweepIdx >= 3) {
          bossAI.attackT = ATTACKS.LINE_SWEEP.duration;
        } else {
          s.phase = 'telegraph';
          s.t = 0;
        }
      }
    },
    draw() {
      const s = bossAI.state;
      if (!s) return;
      ctx.save();
      if (s.phase === 'telegraph') {
        // Pulsing warning bar at the start position of the upcoming
        // sweep, plus a directional arrow so the player knows which
        // way to flee.
        const startX = (s.dir === 1) ? ARENA.x + 4 : ARENA.x + ARENA.w - 4;
        const pulse = 0.45 + 0.35 * Math.sin(s.t * 16);
        ctx.fillStyle = 'rgba(200, 80, 255, ' + (pulse * 0.55).toFixed(2) + ')';
        ctx.fillRect(startX - 4, ARENA.y, 8, ARENA.h);
        ctx.font = 'bold 16px "Courier New", monospace';
        ctx.fillStyle = 'rgba(255, 220, 255, ' + pulse.toFixed(2) + ')';
        ctx.textAlign = 'center';
        const arrow = s.dir === 1 ? 'âº' : 'â';
        ctx.fillText(arrow, startX + s.dir * 18, ARENA.y + ARENA.h / 2 + 4);
      } else {
        ctx.fillStyle = 'rgba(200, 80, 255, 0.5)';
        ctx.fillRect(s.barX - 4, ARENA.y, 8, ARENA.h);
      }
      ctx.restore();
    },
  },

  // One rail blocked at a time, rotating; horizontal traffic on the others.
  RAIL_SHUTDOWN: {
    name: 'RAIL SHUTDOWN',
    duration: 8.0,
    init() {
      bossAI.state.deadLine = -1;
      bossAI.state.deadT = 0;
      bossAI.state.warnT = 0;
      bossAI.state.warnLine = Math.floor(Math.random() * PURPLE_LINES);
      bossAI.state.trafficT = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.3);
      // Warning then shutdown.
      s.warnT += dt;
      if (s.warnT >= 1.0) {
        s.warnT = 0;
        // Clear the previously-dead line.
        if (s.deadLine >= 0) {
          const ly = purpleLineY(s.deadLine);
          for (let j = enemyBullets.length - 1; j >= 0; j--) {
            const b = enemyBullets[j];
            if (b.vx === 0 && b.vy === 0 && Math.abs(b.y - ly) < 6) {
              enemyBullets.splice(j, 1);
            }
          }
        }
        s.deadLine = s.warnLine;
        // Fill it with stationary bullets.
        const ly = purpleLineY(s.deadLine);
        for (let x = ARENA.x + 6; x < ARENA.x + ARENA.w - 6; x += 14) {
          spawnBullet(x, ly, 0, 0, { color: '#ff5577' });
        }
        // Pick the next warning line (different from current dead).
        do {
          s.warnLine = Math.floor(Math.random() * PURPLE_LINES);
        } while (s.warnLine === s.deadLine);
      }
      // Horizontal traffic on active lines.
      s.trafficT += dt;
      if (s.trafficT >= 0.35) {
        s.trafficT = 0;
        for (let i = 0; i < PURPLE_LINES; i++) {
          if (i === s.deadLine) continue;
          const ly = purpleLineY(i);
          const fromLeft = (i % 2 === 0);
          spawnBullet(
            fromLeft ? ARENA.x - 6 : ARENA.x + ARENA.w + 6,
            ly,
            (fromLeft ? 1 : -1) * 150 * P2_SPEED, 0

      }

    draw() {
      const s = bossAI.state;
      if (!s) return;
      ctx.save();

      if (s.warnLine !== s.deadLine) {
        const a = 0.25 + 0.25 * Math.sin(s.warnT * 18);
        ctx.fillStyle = 'rgba(255, 80, 80, ' + a.toFixed(2) + ')';
        const ly = purpleLineY(s.warnLine);
        ctx.fillRect(ARENA.x, ly - 6, ARENA.w, 12);
      }
      ctx.restore();
    },

  // 1-3 bouncing bullets through the rails leaving stationary trails.
  CHAIN_REACTION: {
    name: 'CHAIN REACTION',
    duration: 8.0,
    init() {
      bossAI.state.balls = [_makeChainBall(0)];
      bossAI.state.spawn1 = false;
      bossAI.state.spawn2 = false;
      bossAI.state.dropT = 0;
    },
    update(dt) {
      const s = bossAI.state;
      bossSweep(dt, 0.3);
      if (!s.spawn1 && bossAI.attackT >= 3.0) { s.balls.push(_makeChainBall(0)); s.spawn1 = true; }
      if (!s.spawn2 && bossAI.attackT >= 6.0) { s.balls.push(_makeChainBall(0)); s.spawn2 = true; }
      for (const ball of s.balls) {
        const ly = purpleLineY(ball.line);
        ball.x += ball.vx * dt;
        ball.dropT += dt;
        if (ball.dropT >= 0.18) {
          ball.dropT = 0;

          spawnBullet(ball.x, ly, 0, 0, { color: '#ffaaff', life: 4.0 });
